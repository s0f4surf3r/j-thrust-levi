// === CONSTANTS ===
const SHIP_R=10,POD_R=8;
function getTether(){return 40+(cfg.tether-1)*5;}
const DRAGS=[0.93,0.95,0.96,0.97,0.98,0.985,0.99,0.995,0.999,1.0];
let cfg={inertia:3,thrust:2,rotation:2,gravity:4,difficulty:1,tether:5,lives:7,sound:2,explo:2,strafeBoost:5,speedLimit:5,strafe:2};
try{let sc=localStorage.getItem('thrustSettings');if(sc){let p=JSON.parse(sc);for(let k in p)if(k in cfg)cfg[k]=p[k];}}catch(e){}
function saveCfg(){try{localStorage.setItem('thrustSettings',JSON.stringify(cfg));}catch(e){}}
const PRESETS=[{n:'LEICHT',i:5,t:4,r:6,g:2,d:2,te:1,l:5},{n:'KLASSIK',i:8,t:3,r:5,g:4,d:5,te:5,l:3},{n:'STANDARD',i:7,t:5,r:6,g:5,d:5,te:3,l:3},{n:'SCHWER',i:9,t:5,r:5,g:8,d:8,te:7,l:2}];
let presetIdx=0,saveFeedback=0,nameMode=false,nameStr='';
function getPresets(){let p=[...PRESETS];try{let s=localStorage.getItem('thrustCfg');if(s)p.push(JSON.parse(s));}catch(e){}return p;}
function applyPreset(p){cfg.inertia=p.i;cfg.thrust=p.t;cfg.rotation=p.r;cfg.gravity=p.g;cfg.difficulty=p.d;if(p.te!==undefined)cfg.tether=p.te;if(p.l)cfg.lives=p.l;if(p.s)cfg.sound=p.s;}
function saveCustom(nm){try{localStorage.setItem('thrustCfg',JSON.stringify({n:nm||'EIGENE',i:cfg.inertia,t:cfg.thrust,r:cfg.rotation,g:cfg.gravity,d:cfg.difficulty,te:cfg.tether,l:cfg.lives,s:cfg.sound}));saveFeedback=90;}catch(e){}}
function getColR(){return SHIP_R*(0.2+cfg.difficulty*0.04);}
function getTrkSpd(){return 0.004+cfg.difficulty*0.004;}
function getBltSpd(){return 0.8+cfg.difficulty*0.2;}
function getFireRate(){return 300-cfg.difficulty*28;}
function getDrag(){return DRAGS[cfg.inertia-1];}
function getThrust(){return cfg.thrust*0.02;}
function getRot(){return cfg.rotation*0.015;}
function getGrav(){return cfg.gravity*0.0035;}
function getFuelRate(){return 0.3+cfg.difficulty*0.09;}

// === STRAFE MECHANICS: CONFIG ===
function getStrafeAccel(){return 0.006+(cfg.strafeBoost-1)*0.007;}
function getMaxStrafeSpeed(){return 4.0+(cfg.speedLimit-1)*1.33;}
function getAirControl(){return 0.008;}
let strafeActive=false;
// === STRAFE JUICE ===
let camZoom=1.0, shakeX=0, shakeY=0, lastSpeedThreshold=0;
let windSnd=null;

// === CLASSIC LEVELS (Original Thrust Tilemap Data) ===
const OX=72; // horizontal offset to center 656px (82*8) on 800px canvas

function decRLE(s){
  let r='',last='';
  for(let i=0;i<s.length;i++){
    let c=s[i];
    if(c>='0'&&c<='9'){r+=c;last=c;}
    else{
      let n;
      if(c>='A'&&c<='Z')n=c.charCodeAt(0)-63;
      else n=c.charCodeAt(0)-69;
      r+=last.repeat(n-1);
    }
  }
  return r;
}

// Build tile grid from compressed level data
let tileGrid=null, tileW=0, tileH=0, classicLv=null;

function buildTileGrid(lv){
  classicLv=lv;
  tileW=lv.w;
  tileH=lv.h;
  tileGrid=[];
  // Sky rows (empty)
  for(let r=0;r<lv.sky;r++){
    let row=[];for(let c=0;c<tileW;c++)row.push(0);
    tileGrid.push(row);
  }
  // Terrain rows from RLE data
  for(let ri=0;ri<lv.t.length;ri++){
    let decoded=decRLE(lv.t[ri]);
    let row=[];
    for(let c=0;c<decoded.length&&c<tileW;c++){
      row.push(parseInt(decoded[c])||0);
    }
    // Pad if needed
    while(row.length<tileW)row.push(1);
    tileGrid.push(row);
  }
  // Bedrock rows to fill remaining height
  while(tileGrid.length<tileH){
    let row=[];for(let c=0;c<tileW;c++)row.push(1);
    tileGrid.push(row);
  }
}

function hitTile(px,py,r){
  // Convert from pixel coords to tile coords
  let tx0=Math.floor((px-r-OX)/8);
  let tx1=Math.floor((px+r-OX)/8);
  let ty0=Math.floor((py-r)/8);
  let ty1=Math.floor((py+r)/8);
  for(let ty=ty0;ty<=ty1;ty++){
    for(let tx=tx0;tx<=tx1;tx++){
      if(tx<0||tx>=tileW||ty<0||ty>=tileH)continue;
      if(tileGrid[ty][tx]!==0){
        // Check circle vs tile rect
        let cx=Math.max(tx*8+OX,Math.min(px,tx*8+8+OX));
        let cy=Math.max(ty*8,Math.min(py,ty*8+8));
        let dx=px-cx,dy=py-cy;
        if(dx*dx+dy*dy<r*r)return true;
      }
    }
  }
  return false;
}

    Space:'LEERTASTE',Enter:'ENTER',ShiftLeft:'SHIFT L',ShiftRight:'SHIFT R',
    ControlLeft:'STRG L',ControlRight:'STRG R'};

// Find best German premium voice (Apple: Sandy, Shelley, Flo, Anna)
function leviFindVoice(){
  if(!('speechSynthesis' in window))return;
  let voices=speechSynthesis.getVoices();
  let prefs=['Sandy','Shelley','Flo','Anna'];
  for(let p of prefs){for(let v of voices){if(v.name.includes(p)&&v.lang.startsWith('de')){leviBestVoice=v;return;}}}
  // Fallback: any German voice

const INPUT={
  players:[{},{}],
  coopType:null, // null,'crew','shield','tether'
  lastDevice:'keyboard',
  kbMap:[
    // Player 0: Arrows + Space
    {ArrowLeft:'left',ArrowRight:'right',ArrowUp:'thrust',Space:'fire',KeyT:'tether'},
    // Player 1: WASD + Q/E/F
    {KeyA:'left',KeyD:'right',KeyW:'thrust',KeyQ:'fire',KeyE:'tether',KeyF:'shield',
     KeyZ:'podLeft',KeyC:'podRight'}
  ],
  gpDeadzone:0.15,
  _empty:{left:false,right:false,thrust:false,fire:false,tether:false,brake:false,
    shield:false,strafeLeft:false,strafeRight:false,podLeft:false,podRight:false,
    leftAmount:0,rightAmount:0},

  update(){
    for(let p=0;p<2;p++)this.players[p]=Object.assign({},this._empty);
    // Keyboard → Player 0
    let map0=mode==='levi'?
      {[leviKeys.left]:'left',[leviKeys.right]:'right',[leviKeys.thrust]:'thrust',[leviKeys.shoot]:'fire'}
      :this.kbMap[0];
    for(let code in map0)if(keys[code])this.players[0][map0[code]]=true;
    // Solo strafe (A/D only without coop)
    if(!this.coopType){
      if(keys['KeyA'])this.players[0].strafeLeft=true;
      if(keys['KeyD'])this.players[0].strafeRight=true;
    }
    // Player 1 keyboard (coop only)
    if(this.coopType){
      let map1=this.kbMap[1];
      for(let code in map1)if(keys[code])this.players[1][map1[code]]=true;
    }
    // Gamepad polling
    this._pollGamepads();
  },

  _pollGamepads(){
    let gps=navigator.getGamepads?navigator.getGamepads():[];
    for(let gi=0;gi<gps.length;gi++){
      let gp=gps[gi];
      if(!gp||!gp.connected)continue;
      let anyActive=Math.abs(gp.axes[0]||0)>this.gpDeadzone||Math.abs(gp.axes[1]||0)>this.gpDeadzone;
      if(!anyActive)for(let b=0;b<gp.buttons.length;b++)if(gp.buttons[b]?.pressed){anyActive=true;break;}
      if(anyActive)this.lastDevice='gamepad';
      // Which player? In coop: first GP→Player 1. Solo: first GP→Player 0
      let p=this.coopType?Math.min(gi+1,1):Math.min(gi,1);
      let dz=this.gpDeadzone;
      // Left stick X → rotation (analog)
      let stickX=gp.axes[0]||0;
      if(Math.abs(stickX)>dz){
        let val=(stickX-Math.sign(stickX)*dz)/(1-dz);
        if(val<0){this.players[p].left=true;this.players[p].leftAmount=Math.abs(val);}
        else{this.players[p].right=true;this.players[p].rightAmount=Math.abs(val);}
      }
      if(gp.buttons[7]?.pressed)this.players[p].thrust=true;
      if(gp.buttons[6]?.pressed)this.players[p].brake=true;
      if(gp.buttons[1]?.pressed)this.players[p].fire=true;
      if(gp.buttons[0]?.pressed)this.players[p].tether=true;
      if(gp.buttons[4]?.pressed)this.players[p].tether=true;
      if(gp.buttons[5]?.pressed)this.players[p].shield=true;
      if(gp.buttons[12]?.pressed)this.players[p]._dpadUp=true;
      if(gp.buttons[13]?.pressed)this.players[p]._dpadDown=true;
      if(gp.buttons[14]?.pressed)this.players[p]._dpadLeft=true;
      if(gp.buttons[15]?.pressed)this.players[p]._dpadRight=true;
      if(gp.buttons[9]?.pressed)this.players[p]._start=true;
      if(gp.buttons[1]?.pressed)this.players[p]._back=true;
    }
  },

  get(p,action){return this.players[p]?.[action]||false;},
  getAmount(p,action){
    let amt=this.players[p]?.[action+'Amount'];
    if(amt)return amt;
    return this.players[p]?.[action]?1:0;
  }
};

// Gamepad menu navigation (D-pad + A/B buttons → keydown events)
let gpPrevBtns=[];
function gamepadMenuPoll(){
  let gps=navigator.getGamepads?navigator.getGamepads():[];
  for(let gi=0;gi<Math.min(gps.length,2);gi++){
    let gp=gps[gi];if(!gp||!gp.connected)continue;
    if(!gpPrevBtns[gi])gpPrevBtns[gi]={};
    let prev=gpPrevBtns[gi];
    let btnMap={0:'Space',1:'Escape',9:'Enter',12:'ArrowUp',13:'ArrowDown',14:'ArrowLeft',15:'ArrowRight'};
    for(let btn in btnMap){
      let pressed=gp.buttons[btn]?.pressed;
      let isStart=btn==='9';
      if(state!=='playing'||isStart){
        if(pressed&&!prev[btn]){
          let code=isStart&&state==='playing'?'Escape':btnMap[btn];
          document.dispatchEvent(new KeyboardEvent('keydown',{code:code,key:code==='Space'?' ':code,bubbles:true}));
        }
      }
      if(!pressed&&prev[btn])keys[btnMap[btn]]=false;
      prev[btn]=pressed;
    }
  }
}

function loadClassicLevel(){
  let lv=CL[level];
  buildTileGrid(lv);
  lvlH=lv.h*8;
  walls=[];// no line-segment walls in classic mode

  ship={x:lv.sp.x+OX,y:lv.sp.y,vx:0,vy:0,angle:0,fuel:900,thrusting:false};
  pod={x:lv.pod.x+OX,y:lv.pod.y,vx:0,vy:0,attached:false};
  cam={y:-50};particles=[];bullets=[];eBullets=[];

  // Turrets with direction-based initial angles (count scales with difficulty)
  let allT=lv.turrets.map(t=>{
    let a=0;
    if(t.d==='l')a=-Math.PI/2;
    else if(t.d==='r')a=Math.PI/2;
    else if(t.d==='ul')a=-Math.PI/4;
    else if(t.d==='ur')a=Math.PI/4;
    else if(t.d==='u')a=0;
    else if(t.d==='d')a=Math.PI;
    return{x:t.x+OX,y:t.y,alive:true,timer:Math.floor(getFireRate()+Math.random()*getFireRate()),angle:a};
  });
  let tFrac=Math.min(1,(cfg.difficulty+2)/10);
  turrets=allT.slice(0,Math.max(0,Math.ceil(allT.length*tFrac)));

  // Fuel depots
  classicFuels=lv.fuels.map(f=>({x:f.x+OX,y:f.y,fuel:400,max:400,beaming:false}));
  depots=[];

  // Switches and doors
  classicSwitches=lv.sw?lv.sw.map(s=>({x:s.x+OX,y:s.y,g:s.g})):[];
  classicDoors=[
    lv.d0?lv.d0.map(d=>({r:d[0],c:d[1]})):[],
    lv.d1?lv.d1.map(d=>({r:d[0],c:d[1]})):[]
  ];
  switchTriggered=[false,false];
  // At low difficulty, remove breakable walls (9) to clear the path
  if(cfg.difficulty<=3){
    for(let r=0;r<tileH;r++)for(let c=0;c<tileW;c++)if(tileGrid[r][c]===9)tileGrid[r][c]=0;
  }
  // At low difficulty, erode passages (remove solid tiles adjacent to 2+ empty tiles to widen paths)
  if(cfg.difficulty<=4){
    let passes=cfg.difficulty<=2?2:1;
    for(let p=0;p<passes;p++){
      let toRemove=[];
      for(let r=1;r<tileH-1;r++){
        for(let c=1;c<tileW-1;c++){
          if(tileGrid[r][c]!==1)continue;
          let empN=0;
          if(tileGrid[r-1][c]===0)empN++;
          if(tileGrid[r+1][c]===0)empN++;
          if(tileGrid[r][c-1]===0)empN++;
          if(tileGrid[r][c+1]===0)empN++;
          if(empN>=2)toRemove.push([r,c]);
        }
      }
      for(let[r,c]of toRemove)tileGrid[r][c]=0;
    }
  }
  // Set door tiles to type 10 (closed door)
  for(let g=0;g<2;g++)for(let d of classicDoors[g])if(d.r<tileH&&d.c<tileW)tileGrid[d.r][d.c]=10;

  makeStars(lvlH);invincible=0;startPlaying();
}

function handleServerMsg(msg){
  if(msg.t==='wait'){state='duel_lobby';}
  else if(msg.t==='matched'){
    duelSide=msg.side;duelMapIdx=msg.map;duelMap=DUEL_MAPS[duelMapIdx];
    duelIsOnline=true;duelDisconnected=false;
  }
  else if(msg.t==='countdown'){duelCountdown=msg.n;}
  else if(msg.t==='go'){
    walls=duelMap.walls;lvlH=H;
    let sp=duelMap.spawns[duelSide];
    ship={x:sp.x,y:sp.y,vx:0,vy:0,angle:0,fuel:9999,thrusting:false};
    let opSide=duelSide==='red'?'blue':'red';
    let osp=duelMap.spawns[opSide];
    duelOp={x:osp.x,y:osp.y,vx:0,vy:0,angle:0,thrusting:false,dead:0};
    duelScore={red:0,blue:0};duelShipDead=60;duelMatchWinner='';
    cam={y:0};particles=[];bullets=[];duelOpBullets=[];
    enemies=[];eBullets=[];turrets=[];depots=[];classicFuels=[];tileGrid=null;
    classicSwitches=[];classicDoors=[[],[]];switchTriggered=[false,false];
    invincible=0;makeStars(H);mode='duel';startPlaying();
    duelOpStates=[];duelSendTimer=0;
  }
  else if(msg.t==='state'){
    duelOpStates.push({x:msg.x,y:msg.y,vx:msg.vx,vy:msg.vy,a:msg.a,th:msg.th,time:performance.now()});
    if(duelOpStates.length>5)duelOpStates.shift();
  }
  else if(msg.t==='bullet'){

function interpolateOpponent(){
  if(duelOpStates.length<2||duelOp.dead>0)return;
  let now=performance.now();
  let s1=duelOpStates[duelOpStates.length-2],s2=duelOpStates[duelOpStates.length-1];
  let dt=s2.time-s1.time;if(dt<=0)dt=50;
  let t=Math.min(1.5,(now-s2.time)/dt+1);
  duelOp.x=s1.x+(s2.x-s1.x)*t;
  duelOp.y=s1.y+(s2.y-s1.y)*t;
  duelOp.angle=s1.a+(s2.a-s1.a)*t;
}
function botProbeWall(x,y,r){
  let minD=999;
  for(let w of walls)for(let i=0;i<w.length-1;i++){
    let d=ptSeg(x,y,w[i][0],w[i][1],w[i+1][0],w[i+1][1]);
    if(d<minD)minD=d;
  }
  return minD;
}
function updateDuelBot(){
  let b=duelOp;if(b.dead>0)return;
  let dx=ship.x-b.x,dy=ship.y-b.y,dist=Math.hypot(dx,dy);
  let playerAngle=Math.atan2(dx,-dy);
  let targetAngle=playerAngle;
  let probeDist=50,probeR=20;
  let spd=Math.hypot(b.vx,b.vy);
  let fwdD=botProbeWall(b.x+Math.sin(b.angle)*probeDist,b.y-Math.cos(b.angle)*probeDist,probeR);
  let velD=spd>0.5?botProbeWall(b.x+b.vx*12,b.y+b.vy*12,probeR):999;
  let lA=b.angle-0.7,rA=b.angle+0.7;
  let leftD=botProbeWall(b.x+Math.sin(lA)*40,b.y-Math.cos(lA)*40,probeR);
  let rightD=botProbeWall(b.x+Math.sin(rA)*40,b.y-Math.cos(rA)*40,probeR);
  let hereD=botProbeWall(b.x,b.y,0);
  let wallAvoid=false;
  if(fwdD<35||velD<35||hereD<40){
    wallAvoid=true;
    if(leftD>rightD+10) targetAngle=b.angle-1.2;
    else if(rightD>leftD+10) targetAngle=b.angle+1.2;
    else{
      if(spd>0.5) targetAngle=Math.atan2(-b.vx,b.vy);
      else targetAngle=b.angle+Math.PI;
    }
  }else if(leftD<45){
    targetAngle=b.angle+0.4;
  }else if(rightD<45){
    targetAngle=b.angle-0.4;
  }
  let diff=targetAngle-b.angle;
  while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
  let rotSpd=getRot()*(wallAvoid?1.3:0.7);
  if(Math.abs(diff)>0.05)b.angle+=Math.sign(diff)*Math.min(Math.abs(diff),rotSpd);
  let shouldThrust=false;
  if(wallAvoid){
    shouldThrust=Math.abs(diff)<0.8;
  }else{
    let aDiff=playerAngle-b.angle;
    while(aDiff>Math.PI)aDiff-=Math.PI*2;while(aDiff<-Math.PI)aDiff+=Math.PI*2;
    shouldThrust=Math.abs(aDiff)<1.2&&Math.random()>0.25;
    if(spd>4)shouldThrust=Math.random()>0.6;
  }
  b.thrusting=shouldThrust;
  if(b.thrusting){
    b.vx+=Math.sin(b.angle)*getThrust()*0.6;
    b.vy-=Math.cos(b.angle)*getThrust()*0.6;
    let ex=b.x-Math.sin(b.angle)*SHIP_R,ey=b.y+Math.cos(b.angle)*SHIP_R;
    particles.push({x:ex+(Math.random()-0.5)*4,y:ey+(Math.random()-0.5)*4,
      vx:-Math.sin(b.angle)*(1+Math.random()*1.5),vy:Math.cos(b.angle)*(1+Math.random()*1.5),
      life:10+Math.random()*10,type:'t'});
  }
  b.vy+=getGrav();b.vx*=getDrag();b.vy*=getDrag();b.x+=b.vx;b.y+=b.vy;
  if(!wallAvoid){
    let aDiff=playerAngle-b.angle;
    while(aDiff>Math.PI)aDiff-=Math.PI*2;while(aDiff<-Math.PI)aDiff+=Math.PI*2;
    if(Math.abs(aDiff)<0.4&&dist<400&&Math.random()<0.02){
      duelOpBullets.push({x:b.x+Math.sin(b.angle)*SHIP_R*1.2,y:b.y-Math.cos(b.angle)*SHIP_R*1.2,
        vx:Math.sin(b.angle)*6+b.vx*0.3,vy:-Math.cos(b.angle)*6+b.vy*0.3,life:60});
    }
  }
  if(hitWall(b.x,b.y,getColR())){duelDie('bot');return;}
}
function updateDuelOpBullets(){
  for(let i=duelOpBullets.length-1;i>=0;i--){
    let b=duelOpBullets[i];b.x+=b.vx;b.y+=b.vy;b.life--;
    let wh=hitWall(b.x,b.y,2);
    if(b.life<=0||wh){
      if(wh)for(let j=0;j<3;j++){let a=Math.random()*Math.PI*2;
        particles.push({x:b.x,y:b.y,vx:Math.cos(a)*1,vy:Math.sin(a)*1,life:8,type:'e'});}
      duelOpBullets.splice(i,1);continue;
    }
    if(duelShipDead<=0&&Math.hypot(b.x-ship.x,b.y-ship.y)<SHIP_R){
      duelOpBullets.splice(i,1);duelDie('player');return;
    }
  }
}
function updateDuelPlayerBullets(){
  if(duelOp.dead>0)return;
  for(let i=bullets.length-1;i>=0;i--){
    let b=bullets[i];
    if(Math.hypot(b.x-duelOp.x,b.y-duelOp.y)<SHIP_R){
      bullets.splice(i,1);duelDie('bot');return;
    }
  }
}
function updateDuel(){
  if(duelShipDead>0)duelShipDead=Math.max(0,duelShipDead-1);
  if(duelOp.dead>0)duelOp.dead--;
  let prevBulletCount=bullets.length;
  updateShip();
  if(state!=='playing')return;
  if(duelIsOnline&&bullets.length>prevBulletCount){
    for(let i=prevBulletCount;i<bullets.length;i++)sendDuelBullet(bullets[i]);
  }
  if(duelShipDead<=0&&hitWall(ship.x,ship.y,getColR())){duelDie('player');return;}
  if(ship.x<35)ship.x=35;if(ship.x>765)ship.x=765;
  if(ship.y<35)ship.y=35;if(ship.y>565)ship.y=565;
  if(duelIsOnline){interpolateOpponent();sendDuelState();}
  else{updateDuelBot();if(state!=='playing')return;}
  if(!duelIsOnline){updateDuelOpBullets();if(state!=='playing')return;}
  else{
    for(let i=duelOpBullets.length-1;i>=0;i--){
      let b=duelOpBullets[i];b.x+=b.vx;b.y+=b.vy;b.life--;
      if(b.life<=0||hitWall(b.x,b.y,2)){duelOpBullets.splice(i,1);continue;}
      if(duelShipDead<=0&&Math.hypot(b.x-ship.x,b.y-ship.y)<SHIP_R){
        duelOpBullets.splice(i,1);duelDie('player');return;
      }
    }
  }
  if(!duelIsOnline){updateDuelPlayerBullets();}
}

        if(level>=CL.length)state='complete';
        else loadClassicLevel();}
    }
    else if(state==='complete')state='title';
  }
  e.preventDefault();
});

// === COLLISION ===
function ptSeg(px,py,ax,ay,bx,by){let dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;
if(l2===0)return Math.hypot(px-ax,py-ay);let t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l2));
return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));}

function hitWall(x,y,r){
  if(mode==='classic')return hitTile(x,y,r);
  if(mode==='levi')return false;// Levi: no wall death
  // Arena + Duel: line-segment walls
  for(let w of walls)for(let i=0;i<w.length-1;i++)if(ptSeg(x,y,w[i][0],w[i][1],w[i+1][0],w[i+1][1])<r)return true;
  return false;
}

// === SHIP UPDATE ===
function updateShip(){
  INPUT.update();
  // Coop input mapping: who controls what?
  let pRot=0,pThrust=0,pFire=0,pTether=0;
  if(INPUT.coopType==='crew'){pRot=0;pThrust=1;pFire=1;pTether=1;}
  // shield/tether: P0 has full control
  if(INPUT.get(pRot,'left')){rotHoldL++;
    let amt=INPUT.getAmount(pRot,'left');
    let f=amt>0&&amt<1?amt:Math.min(1,0.3+rotHoldL*0.05);
    ship.angle-=getRot()*f;}else{rotHoldL=0;}
  if(INPUT.get(pRot,'right')){rotHoldR++;
    let amt=INPUT.getAmount(pRot,'right');
    let f=amt>0&&amt<1?amt:Math.min(1,0.3+rotHoldR*0.05);
    ship.angle+=getRot()*f;}else{rotHoldR=0;}
  ship.thrusting=INPUT.get(pThrust,'thrust')&&ship.fuel>0;
  if(ship.thrusting){
    ship.vx+=Math.sin(ship.angle)*getThrust();ship.vy-=Math.cos(ship.angle)*getThrust();
    if(mode!=='arena'&&mode!=='levi')ship.fuel-=getFuelRate();
    let ex=ship.x-Math.sin(ship.angle)*SHIP_R,ey=ship.y+Math.cos(ship.angle)*SHIP_R;
    for(let i=0;i<2;i++)particles.push({x:ex+(Math.random()-0.5)*4,y:ey+(Math.random()-0.5)*4,
      vx:-Math.sin(ship.angle)*(1.5+Math.random()*2)+(Math.random()-0.5)*0.5,
      vy:Math.cos(ship.angle)*(1.5+Math.random()*2)+(Math.random()-0.5)*0.5,life:15+Math.random()*15,type:'t'});
    thrustSndOn();
  }else{thrustSndOff();}

  // Shoot
  if(INPUT.get(pFire,'fire')&&state==='playing'&&shootCooldown<=0){
    bullets.push({x:ship.x+Math.sin(ship.angle)*SHIP_R*1.2,y:ship.y-Math.cos(ship.angle)*SHIP_R*1.2,
      vx:Math.sin(ship.angle)*6+ship.vx*0.3,vy:-Math.cos(ship.angle)*6+ship.vy*0.3,life:60});
    shootCooldown=18;pew();
  }
  if(shootCooldown>0)shootCooldown--;

  // Bullets
  for(let i=bullets.length-1;i>=0;i--){
    let b=bullets[i];b.x+=b.vx;b.y+=b.vy;b.life--;
    let wallHit=hitWall(b.x,b.y,2);
    // Turret hits
    let turretHit=false;
    for(let t of turrets){
      if(t.alive&&Math.hypot(b.x-t.x,b.y-t.y)<16){
        t.alive=false;turretHit=true;score+=200;
        for(let k=0;k<15;k++){let a=Math.random()*Math.PI*2,s=0.5+Math.random()*2.5;
          particles.push({x:t.x,y:t.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:20+Math.random()*25,type:'e'});}
        playBoom(0.5);break;
      }
    }
    // Arena enemy hits
    if(mode==='arena'&&!turretHit){
      for(let j=enemies.length-1;j>=0;j--){
        if(Math.hypot(b.x-enemies[j].x,b.y-enemies[j].y)<14){
          let e=enemies[j];
          for(let k=0;k<15;k++){let a=Math.random()*Math.PI*2,s=0.5+Math.random()*2.5;
            particles.push({x:e.x,y:e.y,vx:Math.cos(a)*s+e.vx*0.3,vy:Math.sin(a)*s+e.vy*0.3,life:20+Math.random()*25,type:'e'});}
          playBoom(0.5);enemies.splice(j,1);score+=100+wave*20;turretHit=true;break;
        }
      }
    }
    // Check switch hits (classic mode)
    let switchHit=false;
    if(mode==='classic'){
      for(let sw of classicSwitches){
        if(!switchTriggered[sw.g]&&Math.hypot(b.x-sw.x,b.y-sw.y)<12){
          switchTriggered[sw.g]=true;switchHit=true;
          for(let d of classicDoors[sw.g]){
            if(d.r<tileH&&d.c<tileW&&tileGrid[d.r][d.c]===10){
              tileGrid[d.r][d.c]=0;
              for(let k=0;k<6;k++){let a=Math.random()*Math.PI*2,sp=0.5+Math.random()*1.5;
                particles.push({x:d.c*8+OX+4,y:d.r*8+4,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:15+Math.random()*15,type:'f'});}
            }
          }
          beep(600,0.15,'sine',0.06);setTimeout(()=>beep(800,0.15,'sine',0.06),120);setTimeout(()=>beep(1000,0.2,'sine',0.06),240);
          break;
        }
      }
    }
    if(b.life<=0||wallHit||turretHit||switchHit){
      if(wallHit){
        // Destroy breakable walls (type 9) on hit
        if(mode==='classic'&&tileGrid){
          let btx=Math.floor((b.x-OX)/8),bty=Math.floor(b.y/8);
          for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
            let cx=btx+dx,cy=bty+dy;
            if(cx>=0&&cx<tileW&&cy>=0&&cy<tileH&&tileGrid[cy][cx]===9){
              tileGrid[cy][cx]=0;
              for(let k=0;k<8;k++){let a=Math.random()*Math.PI*2,sp=0.5+Math.random()*1.5;
                particles.push({x:cx*8+OX+4,y:cy*8+4,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:12+Math.random()*12,type:'e'});}
            }
          }
        }
        for(let j=0;j<5;j++){let a=Math.random()*Math.PI*2;
          particles.push({x:b.x,y:b.y,vx:Math.cos(a)*1.5,vy:Math.sin(a)*1.5,life:10+Math.random()*10,type:'e'});}
      }
      bullets.splice(i,1);
    }
  }

  // === STRAFE MECHANICS ===
  strafeActive=false;
  if(cfg.strafe===2&&!INPUT.coopType){
    const strafeLeft=INPUT.get(0,'strafeLeft'),strafeRight=INPUT.get(0,'strafeRight');
    const rotLeft=INPUT.get(0,'left'),rotRight=INPUT.get(0,'right');
    if(strafeLeft||strafeRight){
      const speed=Math.hypot(ship.vx,ship.vy);
      const strafeDir=strafeLeft?-1:1;
      // CPMA Strafe-Boost: strafe + opposite rotation
      if((strafeLeft&&rotRight)||(strafeRight&&rotLeft)){
        const wishAngle=ship.angle+strafeDir*Math.PI/2;
        const wishX=Math.sin(wishAngle),wishY=-Math.cos(wishAngle);
        if(speed<0.1||(function(){const mx=ship.vx/speed,my=ship.vy/speed;return Math.acos(Math.max(-1,Math.min(1,mx*wishX+my*wishY)))<1.22;})()){
          const accel=getStrafeAccel()*(1+speed*0.3);
          ship.vx+=wishX*accel;ship.vy+=wishY*accel;
          const newSpd=Math.hypot(ship.vx,ship.vy);
          const maxSpd=getMaxStrafeSpeed();
          if(newSpd>maxSpd){ship.vx*=maxSpd/newSpd;ship.vy*=maxSpd/newSpd;}
          strafeActive=true;
          // Cyan strafe particles
          const sx=ship.x+Math.cos(ship.angle)*strafeDir*6,sy=ship.y+Math.sin(ship.angle)*strafeDir*6;
          if(Math.random()<0.6)particles.push({x:sx+(Math.random()-0.5)*4,y:sy+(Math.random()-0.5)*4,
            vx:-wishX*1.5+(Math.random()-0.5)*0.5,vy:-wishY*1.5+(Math.random()-0.5)*0.5,life:10+Math.random()*10,type:'s'});
        }
      }
      // Air Control: strafe without rotation — subtle direction change, no speed gain
      else if(!rotLeft&&!rotRight){
        const ac=getAirControl();
        const perpX=Math.sin(ship.angle+strafeDir*Math.PI/2),perpY=-Math.cos(ship.angle+strafeDir*Math.PI/2);
        ship.vx+=perpX*ac;ship.vy+=perpY*ac;
        const newSpd=Math.hypot(ship.vx,ship.vy);
        if(newSpd>speed&&speed>0.01){ship.vx*=speed/newSpd;ship.vy*=speed/newSpd;}
      }
    }
  }

  // === STRAFE JUICE: Update ===
  if(cfg.strafe===2){
    const spd=Math.hypot(ship.vx,ship.vy);
    // Zoom: sanft rauszoomen ab speed>4, max 15%
    camZoom+=(((spd>4?1-Math.min(0.15,(spd-4)*0.02):1))-camZoom)*0.05;
    // Shake: nur bei aktivem Boost + speed>5
    if(strafeActive&&spd>5){const s=Math.min(3,(spd-5)*0.5);
      shakeX=(Math.random()-0.5)*s;shakeY=(Math.random()-0.5)*s;}
    else{shakeX=0;shakeY=0;}
    // Wind
    windSndUpdate(spd);
    // Partikel-Burst bei Schwellen 5,6,7,...
    const thr=Math.floor(spd);
    if(thr>=5&&thr>lastSpeedThreshold){
      for(let i=0;i<10;i++){const a=Math.PI*2*i/10,sp=1.5+Math.random();
        particles.push({x:ship.x,y:ship.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:15+Math.random()*10,type:'s'});}
      beep(800+thr*200,0.08,'sine',0.04);}
    lastSpeedThreshold=spd>=5?thr:0;
  }else{camZoom+=(1-camZoom)*0.05;shakeX=0;shakeY=0;}

  ship.vy+=getGrav();ship.x+=ship.vx;ship.y+=ship.vy;
  let dr=getDrag();ship.vx*=dr;ship.vy*=dr;
  // Brake: extra drag when LT held (gamepad)
  if(INPUT.get(0,'brake')||INPUT.get(1,'brake')){let bd=0.92;ship.vx*=bd;ship.vy*=bd;}

  // === COOP MECHANICS ===
  if(INPUT.coopType==='shield'){
    if(INPUT.get(1,'left'))shieldAngle-=0.06;
    if(INPUT.get(1,'right'))shieldAngle+=0.06;
    shieldActive=INPUT.get(1,'shield')||INPUT.get(1,'fire');
    if(shieldActive&&shieldEnergy>0){
      shieldEnergy=Math.max(0,shieldEnergy-1);
      for(let i=eBullets.length-1;i>=0;i--){
        let b=eBullets[i],dx=b.x-ship.x,dy=b.y-ship.y;
        let dist=Math.hypot(dx,dy);
        if(dist<25){
          let bAngle=Math.atan2(dy,dx);
          let diff=bAngle-shieldAngle;
          while(diff>Math.PI)diff-=2*Math.PI;
          while(diff<-Math.PI)diff+=2*Math.PI;
          if(Math.abs(diff)<Math.PI/6){
            eBullets.splice(i,1);
            beep(1200,0.05,'sine',0.04);
            for(let j=0;j<5;j++){let a=Math.random()*Math.PI*2;
              particles.push({x:b.x,y:b.y,vx:Math.cos(a)*1.5,vy:Math.sin(a)*1.5,life:8,type:'s'});}
          }
        }
      }
    }else{shieldActive=false;}
    if(!shieldActive)shieldEnergy=Math.min(100,shieldEnergy+0.3);
  }
  if(INPUT.coopType==='tether'&&pod&&pod.attached){
    let podForce=0.08;
    if(INPUT.get(1,'left')){
      let perpX=-Math.cos(ship.angle)*podForce;
      let perpY=-Math.sin(ship.angle)*podForce;
      pod.vx+=perpX;pod.vy+=perpY;
    }
    if(INPUT.get(1,'right')){
      let perpX=Math.cos(ship.angle)*podForce;
      let perpY=Math.sin(ship.angle)*podForce;
      pod.vx+=perpX;pod.vy+=perpY;
    }
  }
}

// === POD + DELIVERY (classic mode - escape through top) ===
function updatePodClassic(){
  if(pod.attached){
    if(podGrace>0){podGrace--;pod.vy+=getGrav()*0.3;}// reduced gravity during liftoff
    else pod.vy+=getGrav();
    pod.x+=pod.vx;pod.y+=pod.vy;
    pod.vx*=getDrag();pod.vy*=getDrag();
    let dx=pod.x-ship.x,dy=pod.y-ship.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>getTether()){let nx=dx/dist,ny=dy/dist,diff=dist-getTether();
      ship.x+=nx*diff*0.35;ship.y+=ny*diff*0.35;pod.x-=nx*diff*0.65;pod.y-=ny*diff*0.65;
      let rv=(pod.vx-ship.vx)*nx+(pod.vy-ship.vy)*ny;
      if(rv>0){ship.vx+=nx*rv*0.35;ship.vy+=ny*rv*0.35;pod.vx-=nx*rv*0.65;pod.vy-=ny*rv*0.65;}}
    if(podGrace<=0&&hitWall(pod.x,pod.y,POD_R)){die();return true;}
  }
  if(!pod.attached){
    if(Math.hypot(ship.x-pod.x,ship.y-pod.y)<35){
      pod.attached=true;pod.vx=0;pod.vy=-0.5;
      podGrace=120;
      beep(440,0.15,'sine',0.06);setTimeout(()=>beep(660,0.15,'sine',0.06),120);setTimeout(()=>beep(880,0.2,'sine',0.06),250);
    }
  }
  // Win: pod attached and escaped through top of cave
  let lv=CL[level];
  if(pod.attached&&ship.y<lv.sky*8&&pod.y<lv.sky*8){
    state='won';score+=1000+level*500;
    beep(523,0.2,'sine',0.06);setTimeout(()=>beep(659,0.2,'sine',0.06),180);
    setTimeout(()=>beep(784,0.2,'sine',0.06),360);setTimeout(()=>beep(1047,0.35,'sine',0.06),540);return true;
  }
  return false;
}

function checkBounds(){
  if(hitWall(ship.x,ship.y,getColR())){die();return true;}
  // Classic boundaries
  if(ship.y>lvlH+50){die();return true;}
  if(ship.x<OX||ship.x>OX+656){die();return true;}
  // y<0 is OK - escape zone
  let ty=Math.max(-H*0.4,Math.min(ship.y-H*0.4,lvlH-H));
  cam.y+=(ty-cam.y)*0.08;
  return false;
}

// === TURRETS ===
function updateTurrets(){
  for(let t of turrets){
    if(!t.alive)continue;
    let dx=ship.x-t.x,dy=ship.y-t.y,dist=Math.hypot(dx,dy);
    if(dist>350)continue;
    let ta=Math.atan2(dx,-dy),diff=ta-t.angle;
    while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
    t.angle+=diff*getTrkSpd();
    t.timer--;
    let bs=getBltSpd();
    if(t.timer<=0&&dist<300){
      eBullets.push({x:t.x+Math.sin(t.angle)*12,y:t.y-Math.cos(t.angle)*12,
        vx:Math.sin(t.angle)*bs,vy:-Math.cos(t.angle)*bs,life:120});
      t.timer=Math.floor(getFireRate()+Math.random()*getFireRate()*0.5);beep(200,0.06,'triangle',0.03);
    }
  }
}

// === CLASSIC FUEL DEPOTS ===
function updateClassicFuels(){
  for(let d of classicFuels){
    d.beaming=false;
    if(d.fuel<=0)continue;
    if(Math.hypot(ship.x-d.x,ship.y-d.y)<60){
      d.beaming=true;
      let t=Math.min(1.5,d.fuel);d.fuel-=t;
      ship.fuel=Math.min(ship.fuel+t,1200);
    }
  }
}

// === ENEMY BULLETS ===
function updateEBullets(){
  for(let i=eBullets.length-1;i>=0;i--){
    let b=eBullets[i];b.x+=b.vx;b.y+=b.vy;b.life--;
    if(b.life<=0||hitWall(b.x,b.y,2)){eBullets.splice(i,1);continue;}
    if(invincible<=0&&Math.hypot(b.x-ship.x,b.y-ship.y)<SHIP_R){eBullets.splice(i,1);die();return;}
  }
}

// === MODE UPDATES ===
function updateClassic(){

  if(state!=='playing')return;
  if(updatePodClassic())return;if(checkBounds())return;
}
function updateArena(){

  if(waveTimer>0){waveTimer--;if(waveTimer<=0&&!waveSpawned){
    let c=Math.min(wave+1,12);for(let i=0;i<c;i++)spawnEnemy();waveSpawned=true;}}
  if(enemies.length===0&&waveSpawned)nextWave();
  for(let e of enemies){
    let ta=Math.atan2(ship.x-e.x,-(ship.y-e.y)),diff=ta-e.angle;
    while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
    e.angle+=diff*0.03;e.vx+=Math.sin(e.angle)*e.speed;e.vy-=Math.cos(e.angle)*e.speed;
    e.vy+=getGrav()*0.3;e.x+=e.vx;e.y+=e.vy;e.vx*=0.98;e.vy*=0.98;
    if(e.x<40){e.x=40;e.vx=Math.abs(e.vx)*0.5;}if(e.x>760){e.x=760;e.vx=-Math.abs(e.vx)*0.5;}
    if(e.y<40){e.y=40;e.vy=Math.abs(e.vy)*0.5;}if(e.y>560){e.y=560;e.vy=-Math.abs(e.vy)*0.5;}
  }
  if(invincible<=0)for(let e of enemies)if(Math.hypot(ship.x-e.x,ship.y-e.y)<SHIP_R+8){die();return;}
  if(hitWall(ship.x,ship.y,SHIP_R*0.6)){die();return;}
  if(ship.x<35)ship.x=35;if(ship.x>765)ship.x=765;
  if(ship.y<35)ship.y=35;if(ship.y>565)ship.y=565;
}

    if(leviProxTimer%15===0){

      let freq=300+(1-Math.min(1,dist/1000))*700;
      beep(freq,0.05,'sine',0.03);
    }
  }
  // Numbers check (sequential — wrong number = warning)
  if(tp==='numbers'){
    for(let i=0;i<leviNumbers.length;i++){
      let num=leviNumbers[i];
      if(!num.hit&&Math.hypot(ship.x-num.x,ship.y-num.y)<35){
        if(i===leviNumIdx){
          num.hit=true;leviNumIdx++;
          beep(400+i*80,0.15,'sine',0.07);
          // Mini confetti on each number
          for(let j=0;j<8;j++){let a=Math.random()*Math.PI*2,s=0.5+Math.random()*1.5;
            particles.push({x:num.x,y:num.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:25+Math.random()*15,type:'f'});}
        }else{
          // Wrong number — warning beep + flash
          leviWrongTimer=30;
          beep(150,0.2,'square',0.06);
        }
      }
    }
  }
  // Word: alphabet grid — find the right letter by ear
  if(tp==='word'&&leviLetterIdx<leviWord.length&&leviWordDone===0){
    let targetCh=leviWord[leviLetterIdx];
    // Auto-repeat word every ~12s, or H key to hear again
    leviSayCd--;
    if(leviSayCd<=0||(keys['KeyH']&&leviSayCd<600)){leviSayWord();}
    // Helper: check if a letter was hit (by ship or bullet)
    let hitThisFrame=false;
    function hitLetter(lt){
      leviLetterIdx++;hitThisFrame=true;
      // Satisfying rising chime (two tones)
      beep(600+leviLetterIdx*80,0.18,'sine',0.09);
      setTimeout(()=>beep(800+leviLetterIdx*80,0.15,'sine',0.07),80);
      // Say next letter after short delay
      if(leviLetterIdx<leviWord.length){
        let nextCh=leviWord[leviLetterIdx];
        setTimeout(()=>leviSayLetter(nextCh),300);
      }
      // Flash effect on the hit letter
      leviLetterFlash={x:lt.x,y:lt.y,ch:lt.ch,timer:30};
      // Grace period: suppress wrong-letter flash for 20 frames
      leviWrongTimer=-20;
      // More particles for celebration
      for(let j=0;j<18;j++){let a=Math.random()*Math.PI*2,s=0.5+Math.random()*2;
        particles.push({x:lt.x,y:lt.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:30+Math.random()*20,type:'f'});}
    }
    // Ship flies into letter
    for(let lt of leviLetters){
      if(Math.hypot(ship.x-lt.x,ship.y-lt.y)<28){
        if(lt.ch===targetCh){hitLetter(lt);break;}
        else if(leviWrongTimer===0){leviWrongTimer=30;beep(150,0.2,'square',0.06);}
      }
    }
    // Bullet hits letter
    if(!hitThisFrame){
      for(let i=bullets.length-1;i>=0;i--){
        let b=bullets[i],hitAny=false;
        for(let lt of leviLetters){
          if(Math.hypot(b.x-lt.x,b.y-lt.y)<24){
            if(lt.ch===targetCh){hitLetter(lt);}
            else if(leviWrongTimer===0){leviWrongTimer=30;beep(150,0.2,'square',0.06);}
            bullets.splice(i,1);hitAny=true;break;
          }
        }
        if(hitAny)break;
      }
    }
  }
  // Win conditions per level type
  if(tp==='pod'){
    if(pod.attached){
      let bx=basket.x,by=basket.y,bw=basket.w,bh=basket.h;
      if(pod.x>bx-bw/2&&pod.x<bx+bw/2&&pod.y>by-bh/2&&pod.y<by+bh/2){
        let spd=Math.hypot(pod.vx,pod.vy)+Math.hypot(ship.vx,ship.vy);
        if(spd<2.5){leviWin();return;}
      }
    }
  }else if(tp==='fly'){
    let bx=basket.x,by=basket.y,bw=basket.w,bh=basket.h;
    if(ship.x>bx-bw/2&&ship.x<bx+bw/2&&ship.y>by-bh/2&&ship.y<by+bh/2){
      if(Math.hypot(ship.vx,ship.vy)<2.5){leviWin();return;}
    }
  }else if(tp==='rings'){
    if(leviRings.every(r=>r.hit)){leviWin();return;}
  }else if(tp==='path'){
    if(leviPathIdx>=leviPath.length){leviWin();return;}
  }else if(tp==='numbers'){
    if(leviNumIdx>=leviNumbers.length){leviWin();return;}
  }else if(tp==='word'){
    // Word done → celebrate, then next word or win
    if(leviWordDone>0){
      leviWordDone--;
      if(leviWordDone===0){
        if(leviWordCount>=leviWordGoal){leviWin();return;}
        // Pick new word (avoid same)
        let prev=leviWord,tries=0;
        do{leviWord=LEVI_WORDS[Math.floor(Math.random()*LEVI_WORDS.length)];tries++;}
        while(leviWord===prev&&tries<20);
        leviLetterIdx=0;leviSayCd=30;leviWrongTimer=0;
      }
    }else if(leviLetterIdx>=leviWord.length){
      // Word complete!
      leviWordCount++;leviWordDone=150;
      // Speak the completed word
      if(window.nativeSpeak){window.nativeSpeak('Super! '+leviWord,140);}
      else if('speechSynthesis' in window){speechSynthesis.cancel();
        let u=new SpeechSynthesisUtterance(leviWord);u.lang='de-DE';u.rate=0.7;u.pitch=1.05;
        if(leviBestVoice)u.voice=leviBestVoice;
        speechSynthesis.speak(u);}
      // Mini confetti
      for(let j=0;j<30;j++){let a=Math.random()*Math.PI*2,s=0.5+Math.random()*2;
        particles.push({x:ship.x,y:ship.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:40+Math.random()*20,type:'f'});}
      beep(800,0.2,'sine',0.08);setTimeout(()=>beep(1000,0.2,'sine',0.08),150);
    }
  }
  // Ship wall bounce (soft, no death)
  if(ship.x<40){ship.x=40;ship.vx=Math.abs(ship.vx)*0.3;}
  if(ship.x>760){ship.x=760;ship.vx=-Math.abs(ship.vx)*0.3;}
  if(ship.y>lvlH-40){ship.y=lvlH-40;ship.vy=-Math.abs(ship.vy)*0.3;}
  // Camera follow
  let ty=Math.max(-H*0.4,Math.min(ship.y-H*0.4,lvlH-H));
  cam.y+=(ty-cam.y)*0.08;
}
function update(){
  gamepadMenuPoll();
  if(saveFeedback>0)saveFeedback--;
  if(state!=='playing'){thrustSndOff();windSndKill();updateParticles();return;}
  if(mode==='classic')updateClassic();else if(mode==='levi')updateLevi();else if(mode==='duel')updateDuel();else updateArena();
  updateParticles();
}
function updateParticles(){for(let i=particles.length-1;i>=0;i--){let p=particles[i];
  p.x+=p.vx;p.y+=p.vy;p.vy+=getGrav()*(p.type==='t'?0.2:0.1);if(--p.life<=0)particles.splice(i,1);}}
function die(){thrustSndKill();windSndKill();for(let i=0;i<40;i++){let a=Math.random()*Math.PI*2,s=0.5+Math.random()*3;
  particles.push({x:ship.x,y:ship.y,vx:Math.cos(a)*s+ship.vx*0.3,vy:Math.sin(a)*s+ship.vy*0.3,life:30+Math.random()*40,type:'e'});}
  playBoom(1.0);lives--;state=lives>0?'dead':'gameover';}

// === RENDER ===
function render(){
  $.fillStyle='#000';$.fillRect(0,0,W,H);
  if(state==='splash'){renderSplash();return;}
  if(state==='title'){renderTitle();return;}
  if(state==='coop_select'){renderCoopSelect();return;}
  if(state==='coop_mode_select'){renderCoopModeSelect();return;}
  if(state==='levelselect'){renderLevelSelect();return;}
  if(state==='levikeyconfig'){renderLeviKeyConfig();return;}
  if(state==='levilevelselect'){renderLeviLevelSelect();return;}
  if(state==='settings'){renderSettings();return;}
  if(state==='duel_menu'){renderDuelMenu();return;}
  if(state==='duel_connect'){renderDuelConnect();return;}
  if(state==='duel_lobby'){renderDuelLobby();return;}
  if(state==='complete'){renderComplete();return;}
  if(state==='gamepad_ready'){renderGamepadReady();return;}

  // === STRAFE JUICE: Camera Zoom + Shake ===
  $.save();$.translate(W/2,H/2);$.scale(camZoom,camZoom);$.translate(-W/2,-H/2);$.translate(shakeX,-cam.y+shakeY);

  // Stars
  if(stars)for(let s of stars){$.fillStyle=`rgba(180,180,220,${s.b})`;$.fillRect(s.x,s.y,s.s,s.s);}

  if(mode==='classic'&&tileGrid){
    // Render tile outlines (edges between solid and empty)
    let startRow=Math.max(0,Math.floor(cam.y/8));
    let endRow=Math.min(tileH,Math.ceil((cam.y+H)/8)+1);
    // Smooth contour rendering (marching squares + contour tracing + Chaikin smoothing)
    function isSolid(ty,tx,lo,hi){if(ty<0||ty>=tileH||tx<0||tx>=tileW)return false;let v=tileGrid[ty][tx];return v>=lo&&v<=hi;}
    function getSegs(lo,hi){
      let segs=[],sr=Math.max(0,startRow-1),er=Math.min(tileH,endRow+1);
      for(let ty=sr;ty<er;ty++){
        for(let tx=0;tx<tileW;tx++){
          let tl=isSolid(ty,tx,lo,hi)?1:0,tr=isSolid(ty,tx+1,lo,hi)?1:0;
          let bl=isSolid(ty+1,tx,lo,hi)?1:0,br=isSolid(ty+1,tx+1,lo,hi)?1:0;
          let c=tl*8+tr*4+br*2+bl;
          if(c===0||c===15)continue;
          let x=tx*8+OX,y=ty*8,s=8,h=4;
          if(c===1||c===14)segs.push([x,y+h,x+h,y+s]);
          else if(c===2||c===13)segs.push([x+h,y+s,x+s,y+h]);
          else if(c===3||c===12)segs.push([x,y+h,x+s,y+h]);
          else if(c===4||c===11)segs.push([x+h,y,x+s,y+h]);
          else if(c===5){segs.push([x,y+h,x+h,y]);segs.push([x+h,y+s,x+s,y+h]);}
          else if(c===6||c===9)segs.push([x+h,y,x+h,y+s]);
          else if(c===7||c===8)segs.push([x,y+h,x+h,y]);
          else if(c===10){segs.push([x,y+h,x+h,y+s]);segs.push([x+h,y,x+s,y+h]);}
        }
      }
      return segs;
    }
    function traceContours(segs){
      let map=new Map(),paths=[];
      function pk(x,y){return(x*10000+y)|0;}
      for(let i=0;i<segs.length;i++){
        let s=segs[i],k1=pk(s[0],s[1]),k2=pk(s[2],s[3]);
        if(!map.has(k1))map.set(k1,[]);map.get(k1).push(i);
        if(!map.has(k2))map.set(k2,[]);map.get(k2).push(i);
      }
      let used=new Uint8Array(segs.length);
      for(let i=0;i<segs.length;i++){
        if(used[i])continue;
        used[i]=1;let s=segs[i],path=[[s[0],s[1]],[s[2],s[3]]];
        for(let dir=0;dir<2;dir++){
          while(true){
            let end=dir===0?path[path.length-1]:path[0];
            let k=pk(end[0],end[1]),nb=map.get(k),found=false;
            if(nb)for(let ni of nb){
              if(used[ni])continue;
              used[ni]=1;let ns=segs[ni];
              let p1=[ns[0],ns[1]],p2=[ns[2],ns[3]];
              let next=(Math.abs(p1[0]-end[0])<0.5&&Math.abs(p1[1]-end[1])<0.5)?p2:p1;
              if(dir===0)path.push(next);else path.unshift(next);
              found=true;break;
            }
            if(!found)break;
          }
        }
        paths.push(path);
      }
      return paths;
    }
    function chaikin(pts,iter){
      for(let it=0;it<iter;it++){
        if(pts.length<3)break;
        let np=[[pts[0][0],pts[0][1]]];
        for(let i=0;i<pts.length-1;i++){
          let x0=pts[i][0],y0=pts[i][1],x1=pts[i+1][0],y1=pts[i+1][1];
          np.push([x0*0.75+x1*0.25,y0*0.75+y1*0.25]);
          np.push([x0*0.25+x1*0.75,y0*0.25+y1*0.75]);
        }
        np.push([pts[pts.length-1][0],pts[pts.length-1][1]]);
        pts=np;
      }
      return pts;
    }
    function drawSmooth(lo,hi){
      let segs=getSegs(lo,hi),paths=traceContours(segs);
      for(let p of paths){
        let sp=chaikin(p,2);
        $.moveTo(sp[0][0],sp[0][1]);
        for(let i=1;i<sp.length;i++)$.lineTo(sp[i][0],sp[i][1]);
      }
    }
    $.strokeStyle='#4a5020';$.lineWidth=1.5;$.shadowColor='#c8e030';$.shadowBlur=3;
    $.beginPath();drawSmooth(1,9);$.stroke();$.shadowBlur=0;
    // Door tiles (cyan outlines, smooth)
    $.strokeStyle='#0aa';$.lineWidth=1.5;$.shadowColor='#0ff';$.shadowBlur=3;
    $.beginPath();drawSmooth(10,10);$.stroke();$.shadowBlur=0;
    // Switch markers (yellow diamonds)
    for(let sw of classicSwitches){
      if(switchTriggered[sw.g])continue;
      if(sw.y<cam.y-20||sw.y>cam.y+H+20)continue;
      let pulse=0.5+0.5*Math.sin(Date.now()*0.005);
      $.fillStyle=`rgba(255,200,0,${0.4+pulse*0.3})`;$.shadowColor='#ff0';$.shadowBlur=4;
      $.beginPath();$.moveTo(sw.x,sw.y-5);$.lineTo(sw.x+4,sw.y);$.lineTo(sw.x,sw.y+5);$.lineTo(sw.x-4,sw.y);$.closePath();$.fill();
      $.shadowBlur=0;
    }
  }else{
    // Terrain (line-based for arena/duel)
    $.strokeStyle=mode==='duel'?'#556':'#4a5020';$.lineWidth=2;
    $.shadowColor=mode==='duel'?'#88a':'#c8e030';$.shadowBlur=3;
    for(let w of walls){$.beginPath();$.moveTo(w[0][0],w[0][1]);for(let i=1;i<w.length;i++)$.lineTo(w[i][0],w[i][1]);$.stroke();}
    $.shadowBlur=0;
  }

  // Levi elements
  if(mode==='levi'){
    let ll=LEVI_LEVELS[leviLevel],tp=ll.type;
    let pulse=0.5+0.5*Math.sin(Date.now()*0.003);
    // Basket (show for pod and fly levels)
    if(tp==='pod'||tp==='fly'){
      let bx=basket.x,by=basket.y,bw=basket.w,bh=basket.h;
      $.strokeStyle=`rgba(255,255,0,${0.4+pulse*0.4})`;$.lineWidth=3;
      $.shadowColor='#ff0';$.shadowBlur=8+pulse*6;
      $.beginPath();
      $.moveTo(bx-bw/2,by-bh/2);$.lineTo(bx-bw/2,by+bh/2);

      $.stroke();$.shadowBlur=0;
      $.fillStyle=`rgba(255,255,0,${0.5+pulse*0.3})`;$.font='bold 10px monospace';$.textAlign='center';
      $.fillText('ZIEL',bx,by+bh/2+14);$.textAlign='left';
    }
    // Rings
    if(tp==='rings'){
      for(let i=0;i<leviRings.length;i++){
        let ring=leviRings[i];
        if(ring.hit){
          $.strokeStyle='rgba(200,224,48,0.6)';$.lineWidth=2;$.shadowColor='#c8e030';$.shadowBlur=4;
        }else{
          let isNext=(i===leviRingIdx);
          let rp=isNext?0.7+0.3*Math.sin(Date.now()*0.006):0.3+0.2*Math.sin(Date.now()*0.003);

    }

    if(tp==='path'&&leviPath.length>0){

      for(let i=0;i<leviPath.length-1;i++){

        $.shadowBlur=0;

        $.fillText(f.ch,f.x,f.y+6);$.textAlign='left';$.shadowBlur=0;
        // Inner bright flash

        $.beginPath();$.arc(f.x,f.y,22*t,0,Math.PI*2);$.fill();
      }
      if(leviWrongTimer>0){

      }
    }
  }

  // Classic fuel depots
  if(mode==='classic'){

      $.beginPath();$.moveTo(d.x-7,d.y-10);$.lineTo(d.x+7,d.y-10);$.lineTo(d.x+8,d.y+8);

      $.fillStyle=active?'#0ff':'#444';$.font='bold 8px monospace';$.textAlign='center';
      $.fillText('F',d.x,d.y+3);$.textAlign='left';
      // Beam

        $.shadowColor='#0ff';$.shadowBlur=8;
        $.beginPath();$.moveTo(ship.x,ship.y);$.lineTo(d.x,d.y);$.stroke();$.shadowBlur=0;
        // Fuel particles along beam
        let bx=ship.x+(d.x-ship.x)*Math.random(),by=ship.y+(d.y-ship.y)*Math.random();
        particles.push({x:bx+(Math.random()-0.5)*6,y:by+(Math.random()-0.5)*6,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,life:8,type:'f'});

    }
  }

  // Turrets
  for(let t of turrets){
    $.save();$.translate(t.x,t.y);
    if(t.alive){

      $.strokeStyle='#555';$.lineWidth=1;$.stroke();
      $.rotate(t.angle);$.strokeStyle='#f55';$.lineWidth=2.5;$.shadowColor='#f00';$.shadowBlur=3;
      $.beginPath();$.moveTo(0,0);$.lineTo(0,-14);$.stroke();$.shadowBlur=0;
      $.fillStyle='#f88';$.beginPath();$.arc(0,-14,2.5,0,Math.PI*2);$.fill();
    }else{$.fillStyle='#333';$.beginPath();$.arc(0,0,5,0,Math.PI*2);$.fill();}
    $.restore();
  }

  // Enemy bullets
  $.fillStyle='#f55';$.shadowColor='#f00';$.shadowBlur=3;
  for(let b of eBullets)$.fillRect(b.x-2,b.y-2,4,4);
  $.shadowBlur=0;

  // Pod glow
  if(mode!=='arena'&&!(mode==='levi'&&LEVI_LEVELS[leviLevel].type!=='pod')&&!pod.attached&&state==='playing'){
    let pulse=0.5+0.5*Math.sin(Date.now()*0.005);
    $.strokeStyle=`rgba(255,128,0,${0.3+pulse*0.4})`;$.lineWidth=1;
    $.beginPath();$.arc(pod.x,pod.y,18+pulse*5,0,Math.PI*2);$.stroke();
  }
  // Pod (round)
  if(mode!=='arena'&&!(mode==='levi'&&LEVI_LEVELS[leviLevel].type!=='pod')){
    $.strokeStyle=pod.attached?'#0ff':'#f80';$.lineWidth=2;
    $.shadowColor=pod.attached?'#0ff':'#f80';$.shadowBlur=4;
    $.beginPath();$.arc(pod.x,pod.y,POD_R,0,Math.PI*2);$.stroke();
    // Ring detail
    $.beginPath();$.arc(pod.x,pod.y,POD_R*0.45,0,Math.PI*2);$.stroke();
    $.shadowBlur=0;
    if(pod.attached){$.strokeStyle='#0aa';$.lineWidth=1.5;
      $.beginPath();$.moveTo(ship.x,ship.y);$.lineTo(pod.x,pod.y);$.stroke();}
  }

  // Arena enemies
  if(mode==='arena')for(let e of enemies){
    $.save();$.translate(e.x,e.y);$.rotate(e.angle);
    $.strokeStyle='#f44';$.lineWidth=2;$.shadowColor='#f00';$.shadowBlur=4;
    $.beginPath();$.moveTo(0,-8);$.lineTo(-6,6);$.lineTo(0,3);$.lineTo(6,6);$.closePath();$.stroke();
    $.shadowBlur=0;$.restore();
  }

  // Particles
  for(let p of particles){let a=p.life/50;
    if(p.type==='s'){$.fillStyle=`rgba(0,255,255,${a})`;$.fillRect(p.x-1.5,p.y-1.5,3,3);}
    else if(p.type==='e'){$.fillStyle=`rgba(255,${Math.floor(50+200*a)},0,${a})`;$.fillRect(p.x-1.5,p.y-1.5,3,3);}
    else if(p.type==='f'){$.fillStyle=`rgba(0,220,255,${a*2})`;$.fillRect(p.x-1,p.y-1,2,2);}
    else{$.fillStyle=`rgba(255,${Math.floor(150*a)},0,${a})`;$.fillRect(p.x-1,p.y-1,2,2);}
  }

  // Bullets
  if(mode==='duel'){
    let pc=duelSide==='red'?'#f88':'#8af';
    $.fillStyle=pc;$.shadowColor=pc;$.shadowBlur=4;
    for(let b of bullets)$.fillRect(b.x-1.5,b.y-1.5,3,3);$.shadowBlur=0;
    let oc=duelSide==='red'?'#8af':'#f88';
    $.fillStyle=oc;$.shadowColor=oc;$.shadowBlur=4;
    for(let b of duelOpBullets)$.fillRect(b.x-1.5,b.y-1.5,3,3);$.shadowBlur=0;
  }else{
    $.fillStyle='#ff0';$.shadowColor='#ff0';$.shadowBlur=4;
    for(let b of bullets)$.fillRect(b.x-1.5,b.y-1.5,3,3);$.shadowBlur=0;
  }

  // Ship
  if(state==='playing'){
    if(mode==='duel'){
      // Duel: draw both ships with team colors
      let pColor=duelSide==='red'?'#f44':'#48f',pGlow=duelSide==='red'?'#f00':'#44f';
      let pVis=duelShipDead<=0||Math.floor(duelShipDead/4)%2===0;
      if(pVis){
        $.save();$.translate(ship.x,ship.y);$.rotate(ship.angle);
        $.strokeStyle=pColor;$.lineWidth=2;$.shadowColor=pGlow;$.shadowBlur=4;
        $.beginPath();$.moveTo(0,-SHIP_R);$.lineTo(-SHIP_R*0.7,SHIP_R*0.7);
        $.lineTo(-SHIP_R*0.3,SHIP_R*0.4);$.lineTo(SHIP_R*0.3,SHIP_R*0.4);
        $.lineTo(SHIP_R*0.7,SHIP_R*0.7);$.closePath();$.stroke();$.shadowBlur=0;
        if(ship.thrusting){let fl=SHIP_R*(0.8+Math.random()*0.6);
          $.strokeStyle='#f80';$.lineWidth=2;$.beginPath();
          $.moveTo(-SHIP_R*0.25,SHIP_R*0.5);$.lineTo(0,SHIP_R*0.5+fl);$.lineTo(SHIP_R*0.25,SHIP_R*0.5);$.stroke();}
        $.restore();
      }
      // Opponent ship
      let oColor=duelSide==='red'?'#48f':'#f44',oGlow=duelSide==='red'?'#44f':'#f00';
      let oVis=duelOp.dead<=0||Math.floor(duelOp.dead/4)%2===0;
      if(oVis){
        $.save();$.translate(duelOp.x,duelOp.y);$.rotate(duelOp.angle);
        $.strokeStyle=oColor;$.lineWidth=2;$.shadowColor=oGlow;$.shadowBlur=4;
        $.beginPath();$.moveTo(0,-SHIP_R);$.lineTo(-SHIP_R*0.7,SHIP_R*0.7);
        $.lineTo(-SHIP_R*0.3,SHIP_R*0.4);$.lineTo(SHIP_R*0.3,SHIP_R*0.4);
        $.lineTo(SHIP_R*0.7,SHIP_R*0.7);$.closePath();$.stroke();$.shadowBlur=0;
        if(duelOp.thrusting){let fl=SHIP_R*(0.8+Math.random()*0.6);
          $.strokeStyle='#f80';$.lineWidth=2;$.beginPath();
          $.moveTo(-SHIP_R*0.25,SHIP_R*0.5);$.lineTo(0,SHIP_R*0.5+fl);$.lineTo(SHIP_R*0.25,SHIP_R*0.5);$.stroke();}
        $.restore();
      }
    }else{
    let vis=invincible<=0||Math.floor(invincible/4)%2===0;
    if(vis){
      $.save();$.translate(ship.x,ship.y);$.rotate(ship.angle);
      $.strokeStyle='#c8e030';$.lineWidth=2;$.shadowColor='#c8e030';$.shadowBlur=4;
      $.beginPath();$.moveTo(0,-SHIP_R);$.lineTo(-SHIP_R*0.7,SHIP_R*0.7);
      $.lineTo(-SHIP_R*0.3,SHIP_R*0.4);$.lineTo(SHIP_R*0.3,SHIP_R*0.4);
      $.lineTo(SHIP_R*0.7,SHIP_R*0.7);$.closePath();$.stroke();$.shadowBlur=0;
      if(ship.thrusting){let fl=SHIP_R*(0.8+Math.random()*0.6);
        $.strokeStyle='#f80';$.lineWidth=2;$.beginPath();
        $.moveTo(-SHIP_R*0.25,SHIP_R*0.5);$.lineTo(0,SHIP_R*0.5+fl);$.lineTo(SHIP_R*0.25,SHIP_R*0.5);$.stroke();
        $.strokeStyle='#ff0';$.lineWidth=1;$.beginPath();
        $.moveTo(-SHIP_R*0.1,SHIP_R*0.5);$.lineTo(0,SHIP_R*0.5+fl*0.6);$.lineTo(SHIP_R*0.1,SHIP_R*0.5);$.stroke();}
      $.restore();
      // === STRAFE JUICE: Speed-Lines (world-space, after ship restore) ===
      if(cfg.strafe===2){const spd=Math.hypot(ship.vx,ship.vy);
      if(spd>4.0){const n=Math.min(12,Math.floor((spd-4)*2));const op=Math.min(0.9,(spd-4)*0.2);
        $.strokeStyle=`rgba(0,255,255,${op})`;$.lineWidth=1+(spd-4)*0.3;
        $.shadowColor='#0ff';$.shadowBlur=4;
        for(let i=0;i<n;i++){const off=(Math.random()-0.5)*12;
          const sx=ship.x+Math.cos(ship.angle)*off+ship.vx*2,sy=ship.y+Math.sin(ship.angle)*off+ship.vy*2;
          const len=spd*(3+Math.random()*2);
          $.beginPath();$.moveTo(sx,sy);$.lineTo(sx-ship.vx/spd*len,sy-ship.vy/spd*len);$.stroke();}
        $.shadowBlur=0;}}
      // Shield rendering (Coop Schildmann)
      if(INPUT.coopType==='shield'&&shieldEnergy>0){
        let sa=shieldAngle,sr=22;
        let alpha=shieldActive?0.6:0.15;
        let eRatio=shieldEnergy/100;
        $.strokeStyle=`rgba(0,255,255,${alpha*eRatio})`;
        $.lineWidth=shieldActive?4:2;
        $.shadowColor='#0ff';$.shadowBlur=shieldActive?8:0;
        $.beginPath();$.arc(ship.x,ship.y,sr,sa-Math.PI/6,sa+Math.PI/6);$.stroke();
        $.shadowBlur=0;
        $.fillStyle='#033';$.fillRect(ship.x-15,ship.y+18,30,3);
        $.fillStyle=shieldEnergy>30?'#0ff':'#f44';
        $.fillRect(ship.x-15,ship.y+18,30*eRatio,3);
      }
    }
    }
  }
  $.restore();

  // HUD
  if(mode==='duel')renderDuelHUD();
  else renderHUD();

  // Overlays
  let _gp=INPUT.lastDevice==='gamepad';
  if(state==='dead')overlay('ZERSTÖRT!',_gp?'A drücken... | Start: Pause':'Leertaste drücken... | ESC: Pause');
  else if(state==='gameover'){
    if(mode==='arena')overlay('GAME OVER','Score: '+score+' | Welle '+wave,_gp?'A für Menü':'Leertaste für Menü');
    else overlay('GAME OVER','Score: '+score,_gp?'A für Menü':'Leertaste für Menü');
  }else if(state==='won'){
    if(mode==='levi'){
      let ll=LEVI_LEVELS[leviLevel];
      $.fillStyle='rgba(0,0,0,0.6)';$.fillRect(0,H/2-110,W,220);$.textAlign='center';
      $.fillStyle='#ff0';$.shadowColor='#ff0';$.shadowBlur=12;
      if(leviLevel===5){
        $.font='bold 40px monospace';$.fillText('MEISTER, LEVI!',W/2,H/2-40);
        $.shadowBlur=0;
        // Show the completed word big
        $.fillStyle='#0ff';$.font='bold 32px monospace';$.fillText(leviWord,W/2,H/2+5);
      }else{
        $.font='bold 36px monospace';$.fillText('SUPER, LEVI!',W/2,H/2-35);
        $.shadowBlur=0;
      }
      $.fillStyle='#c8e030';$.font='16px monospace';$.fillText(ll.n+' geschafft!',W/2,H/2+30);
      if(leviLevel<5){
        $.fillStyle='#8aa020';$.font='14px monospace';$.fillText(_gp?'A = Nächstes Level | B = Menü':'Leertaste = Nächstes Level | ESC = Menü',W/2,H/2+60);
      }else{
        $.fillStyle='#0ff';$.font='14px monospace';$.fillText('Alle 6 Level gemeistert!',W/2,H/2+55);
        $.fillStyle='#8aa020';$.font='14px monospace';$.fillText(_gp?'A = Nochmal | B = Menü':'Leertaste = Nochmal | ESC = Menü',W/2,H/2+75);
      }
      $.textAlign='left';
    }else overlay('MISSION '+(level+1)+' COMPLETE!','Score: '+score,_gp?'A weiter':'Leertaste weiter');
  }
  if(mode==='arena'&&state==='playing'&&waveTimer>0){
    $.textAlign='center';$.fillStyle='#ff0';$.shadowColor='#ff0';$.shadowBlur=8;
    $.font='bold 28px monospace';$.fillText('WELLE '+wave,W/2,H/2-20);
    $.shadowBlur=0;$.font='14px monospace';$.fillStyle='#c8e030';
    $.fillText('Mach dich bereit!',W/2,H/2+15);$.textAlign='left';
  }
  // Duel match end overlay
  if(state==='duel_match_end'){
    $.fillStyle='rgba(0,0,0,0.7)';$.fillRect(0,0,W,H);
    $.textAlign='center';
    if(duelDisconnected){
      $.fillStyle='#ff0';$.shadowColor='#ff0';$.shadowBlur=8;
      $.font='bold 28px monospace';$.fillText('GEGNER HAT VERLASSEN',W/2,H/2-50);$.shadowBlur=0;
    }else{
      let winColor=duelMatchWinner==='red'?'#f44':'#48f';
      let winLabel=duelMatchWinner===duelSide?'DU GEWINNST!':(duelIsOnline?'GEGNER GEWINNT!':'BOT GEWINNT!');
      $.fillStyle=winColor;$.shadowColor=winColor;$.shadowBlur=12;
      $.font='bold 32px monospace';$.fillText(winLabel,W/2,H/2-60);$.shadowBlur=0;
    }
    $.font='bold 24px monospace';
    $.fillStyle='#f44';$.fillText(duelScore.red,W/2-40,H/2-10);
    $.fillStyle='#666';$.fillText(':',W/2,H/2-10);
    $.fillStyle='#48f';$.fillText(duelScore.blue,W/2+40,H/2-10);
    $.fillStyle='#c8e030';$.font='14px monospace';
    $.fillText(INPUT.lastDevice==='gamepad'?'A = Revanche | B = Menü':'R = Revanche | ESC = Menü',W/2,H/2+40);
    $.textAlign='left';
  }
  // Pause overlay
  if(state==='paused'){
    $.fillStyle='rgba(0,0,0,0.7)';$.fillRect(0,0,W,H);
    $.textAlign='center';$.fillStyle='#ff0';$.shadowColor='#ff0';$.shadowBlur=8;
    $.font='bold 24px monospace';$.fillText('PAUSE',W/2,H/2-50);$.shadowBlur=0;
    $.fillStyle='#c8e030';$.font='16px monospace';$.fillText('Spiel beenden?',W/2,H/2-15);
    let labels=['Weiterspielen','Beenden'];
    for(let i=0;i<2;i++){
      let bx=W/2-140+i*160,by=H/2+15,bw=120,bh=36;
      $.fillStyle=pauseSel===i?'#c8e030':'#556818';$.fillRect(bx,by,bw,bh);
      $.fillStyle=pauseSel===i?'#000':'#8aa020';$.font=(pauseSel===i?'bold ':'')+'13px monospace';
      $.fillText(labels[i],bx+bw/2,by+23);
    }
    $.fillStyle='#8aa020';$.font='10px monospace';
    $.fillText(INPUT.lastDevice==='gamepad'?'D-Pad Wählen | A Bestätigen | Start Zurück':'< > Wählen | ENTER Bestätigen | ESC Zurück',W/2,H/2+75);
    $.textAlign='left';
  }
}

function renderHUD(){
  let lv=mode==='classic'?CL[level]:null;

  if(mode!=='levi'){
    $.fillStyle='#8aa020';$.font='10px monospace';$.textAlign='center';
    if(mode==='arena')$.fillText('ARENA | WELLE '+wave,W/2,H-8);
    else $.fillText('KLASSIK '+(level+1)+': '+lv.n,W/2,H-8);
    $.textAlign='left';
  }

  // Fuel
  if(mode!=='arena'&&mode!=='levi'){
    let maxF=1200;
    $.fillStyle='#222';$.fillRect(10,10,150,12);
    let fr=Math.max(0,ship.fuel/maxF);
    $.fillStyle=fr>0.25?'#a8c028':(fr>0.1?'#f80':'#f00');
    $.fillRect(10,10,150*fr,12);
    $.strokeStyle='#8aa020';$.lineWidth=1;$.strokeRect(10,10,150,12);
    $.fillStyle='#c8e030';$.font='10px monospace';$.fillText('FUEL',165,20);
  }

  if(mode!=='levi'){
    let ly=mode==='arena'?50:(cfg.strafe===2?50:42);
    let lx=mode==='arena'?42:20;
    for(let i=0;i<lives;i++){$.save();$.translate(lx+i*22,ly);$.strokeStyle='#c8e030';$.lineWidth=1.5;
      $.beginPath();$.moveTo(0,-5);$.lineTo(-4,4);$.lineTo(4,4);$.closePath();$.stroke();$.restore();}

    $.fillStyle='#c8e030';$.font='14px monospace';$.textAlign='right';
    $.fillText('SCORE '+String(score).padStart(6,'0'),W-10,22);$.textAlign='left';
  }

  $.fillStyle='#8aa020';$.font='10px monospace';
  {const spd=Math.hypot(ship.vx,ship.vy);const spdTxt='SPD '+spd.toFixed(1);
  if(mode==='levi'){
    let tp=LEVI_LEVELS[leviLevel].type;
    // Numbers: show progress "3/9"
    if(tp==='numbers'){$.fillStyle='#0ff';$.font='bold 14px monospace';$.textAlign='center';
      $.fillText(leviNumIdx+' / '+leviNumbers.length,W/2,40);$.textAlign='left';}
    // Word: show collected letters + underscores + word counter
    if(tp==='word'&&leviWord){
      // Word counter top-right
      $.fillStyle='#8aa020';$.font='12px monospace';$.textAlign='right';
      $.fillText('Wort '+leviWordCount+'/'+leviWordGoal,W-10,20);$.textAlign='center';
      if(leviWordDone>0){
        // Between words: show completed word big
        $.fillStyle='#c8e030';$.shadowColor='#c8e030';$.shadowBlur=8;
        $.font='bold 36px monospace';$.fillText(leviWord,W/2,42);$.shadowBlur=0;
      }else{
        $.font='bold 28px monospace';
        let spacing=30,wx=W/2-(leviWord.length*spacing)/2+spacing/2;
        for(let i=0;i<leviWord.length;i++){
          if(i<leviLetterIdx){
            $.fillStyle='#c8e030';$.shadowColor='#c8e030';$.shadowBlur=4;
            $.fillText(leviWord[i],wx+i*spacing,42);$.shadowBlur=0;
          }else{
            $.fillStyle='#444';$.fillText('_',wx+i*spacing,42);
          }
        }
        $.fillStyle='rgba(0,255,255,0.4)';$.font='10px monospace';
        $.fillText(INPUT.lastDevice==='gamepad'?'H = Wort hören | B = Schießen':'H = Wort hören | SPACE = Schießen',W/2,60);
      }
      $.textAlign='left';}
  }
  else if(mode==='arena'){$.fillText(spdTxt,W-80,42);$.fillText('WELLE '+wave,W-80,64);}
  else{$.fillText('ALT '+Math.max(0,Math.floor((lvlH-ship.y)/10)),W-80,42);$.fillText(spdTxt,W-80,55);}
  // Colored SPD overlay when fast
  const spdY=mode==='arena'?42:55;
  if(cfg.strafe===2&&spd>4.0){const t=Math.min(1,(spd-4)/(getMaxStrafeSpeed()-4));
    const r=Math.floor(t*255),g=Math.floor((1-t*0.5)*255);
    $.fillStyle=`rgb(${r},${g},0)`;$.fillText(spdTxt,W-80,spdY);}
  // === STRAFE JUICE: FLOW Bar ===
  if(cfg.strafe===2){
    const leviScale=mode==='levi'?4.0:getMaxStrafeSpeed();
    const fill=Math.min(1,spd/leviScale);
    const flowX=mode==='levi'?42:10;
    const flowW=mode==='levi'?80:150;
    const flowY=mode==='arena'?10:26,flowH=8;
    $.fillStyle='#111';$.fillRect(flowX,flowY,flowW,flowH);
    const flowCol=fill<0.5?'#8aa020':fill<0.75?'#0cc':fill<0.9?'#cc0':'#f44';
    if(strafeActive){$.shadowColor='#0ff';$.shadowBlur=6+Math.sin(Date.now()*0.01)*4;}
    $.fillStyle=flowCol;$.fillRect(flowX,flowY,flowW*fill,flowH);
    $.shadowBlur=0;
    $.strokeStyle='#556818';$.lineWidth=0.5;$.strokeRect(flowX,flowY,flowW,flowH);
    $.fillStyle='#c8e030';$.font='10px monospace';$.fillText('FLOW',flowX+flowW+5,flowY+9);
  }}

  if(mode!=='arena'&&pod.attached&&!(mode==='levi'&&LEVI_LEVELS[leviLevel].type!=='pod')){$.fillStyle='#0ff';$.font='12px monospace';$.textAlign='center';
    $.fillText(mode==='levi'?'POD AM SEIL':'POD ATTACHED',W/2,22);$.textAlign='left';}

  // Off-screen indicators
  if(mode==='classic'&&state==='playing'){
    if(!pod.attached){let py=pod.y-cam.y;
      if(py>H){$.fillStyle='#f80';$.textAlign='center';$.font='10px monospace';
        $.beginPath();$.moveTo(W/2-6,H-28);$.lineTo(W/2+6,H-28);$.lineTo(W/2,H-18);$.fill();
        $.fillText('POD',W/2,H-32);$.textAlign='left';}}
    if(pod.attached){
      let lv=CL[level];
      let skyY=lv.sky*8-cam.y;
      if(skyY<0){$.fillStyle='#ff0';$.textAlign='center';$.font='10px monospace';
        $.beginPath();$.moveTo(W/2-6,78);$.lineTo(W/2+6,78);$.lineTo(W/2,68);$.fill();
        $.fillText('FLUCHT',W/2,90);$.textAlign='left';}
    }
  }

  if(state==='playing'&&mode==='levi'){
    // Dark HUD band at bottom so text doesn't collide with walls
    let grd=$.createLinearGradient(0,H-52,0,H);
    grd.addColorStop(0,'rgba(0,0,0,0)');grd.addColorStop(0.3,'rgba(0,0,0,0.6)');grd.addColorStop(1,'rgba(0,0,0,0.8)');
    $.fillStyle=grd;$.fillRect(0,H-52,W,52);
    $.fillStyle='rgba(200,224,48,0.6)';$.font='13px monospace';$.textAlign='center';
    let kl=keyName(leviKeys.left),kr=keyName(leviKeys.right),kt=keyName(leviKeys.thrust),ks=keyName(leviKeys.shoot);
    let ctrl=LEVI_LEVELS[leviLevel].type==='word'?
      kl+' '+kr+' Drehen | '+kt+' Schub | '+ks+' Schießen | H Wort hören':
      kl+' '+kr+' Drehen | '+kt+' Schub | ESC Menü';
    $.fillText(ctrl,W/2,H-34);
    $.fillStyle='rgba(0,255,255,0.5)';$.font='11px monospace';
    $.fillText(LEVI_LEVELS[leviLevel].desc,W/2,H-21);
    $.fillStyle='rgba(138,160,32,0.6)';$.font='10px monospace';
    $.fillText('LEVI '+(leviLevel+1)+': '+LEVI_LEVELS[leviLevel].n,W/2,H-8);$.textAlign='left';
  }
  else if(state==='playing'&&((mode==='classic'&&!pod.attached&&ship.y<200)||(mode==='arena'&&wave===1&&waveTimer>0))){
    $.fillStyle='rgba(200,224,48,0.4)';$.font='11px monospace';$.textAlign='center';
    if(INPUT.lastDevice==='gamepad'){
      $.fillText('Stick Drehen | RT Schub | LT Bremse | B Feuern | Start Pause',W/2,H-20);
    }else{
      $.fillText('← → Drehen | ↑ Schub | SPACE Feuern | ESC Menü',W/2,H-20);
      $.fillStyle='rgba(0,255,255,0.4)';$.fillText('A/D Strafe | A/D + Drehung = Strafe-Boost!',W/2,H-7);
    }
    $.textAlign='left';
  }
  // Coop HUD label
  if(INPUT.coopType&&state==='playing'){
    let typeNames={crew:'STEUERMANN + MASCHINIST',shield:'PILOT + SCHILDMANN',tether:'PILOT + SEILMEISTER'};
    $.fillStyle='rgba(0,255,255,0.4)';$.font='10px monospace';$.textAlign='right';
    $.fillText('COOP: '+(typeNames[INPUT.coopType]||''),W-10,H-8);$.textAlign='left';
  }
}

function overlay(l1,l2,l3){$.fillStyle='rgba(0,0,0,0.6)';$.fillRect(0,H/2-60,W,120);$.textAlign='center';
  $.fillStyle='#c8e030';$.font='bold 22px monospace';$.fillText(l1,W/2,H/2-15);
  $.font='14px monospace';$.fillText(l2,W/2,H/2+15);
  if(l3){$.fillStyle='#8aa020';$.font='12px monospace';$.fillText(l3,W/2,H/2+40);}$.textAlign='left';}

// === SCREENS ===

function renderTitle(){
  if(!stars)makeStars(H);
  for(let s of stars){$.fillStyle=`rgba(180,180,220,${s.b})`;$.fillRect(s.x,(s.y+Date.now()*0.008*s.b)%H,s.s,s.s);}
  $.textAlign='center';

  // --- Animated logo: ship with swinging J on tether ---
  let t=Date.now()*0.001;
  // Pendulum: gentle swing
  let swing=Math.sin(t*1.2)*0.18;
  // Ship bobs slightly
  let shipBob=Math.sin(t*2)*2;

  $.save();$.translate(W/2,90+shipBob);const sc=0.28;$.scale(sc,sc);
  // Ship hull
  $.fillStyle='#0FAAB6';$.beginPath();$.moveTo(0,-200);$.lineTo(-18,-150);$.lineTo(-10,-156);$.lineTo(-10,-140);$.lineTo(10,-140);$.lineTo(10,-156);$.lineTo(18,-150);$.closePath();$.fill();
  // Cockpit
  $.fillStyle='#0D8A94';$.beginPath();$.ellipse(0,-175,5,6,0,0,Math.PI*2);$.fill();
  $.fillStyle='rgba(15,170,182,0.5)';$.beginPath();$.ellipse(0,-176,3,4,0,0,Math.PI*2);$.fill();
  // Flame (flickers)
  let flicker=0.6+0.4*Math.sin(t*12);
  $.fillStyle=`rgba(222,156,54,${flicker*0.8})`;$.beginPath();$.moveTo(-7,-140);$.lineTo(0,-112-Math.sin(t*8)*4);$.lineTo(7,-140);$.closePath();$.fill();
  $.fillStyle=`rgba(253,191,85,${flicker*0.6})`;$.beginPath();$.moveTo(-4,-140);$.lineTo(0,-120-Math.sin(t*10)*3);$.lineTo(4,-140);$.closePath();$.fill();
  // Struts
  $.fillStyle='rgba(15,170,182,0.5)';$.fillRect(-16,-140,32,4);
  $.restore();

  // Tether + swinging J-Hook (pendulum from ship bottom)
  $.save();$.translate(W/2,90+shipBob);
  let tetherLen=55;
  // Tether attachment point (ship bottom, scaled)
  let ax=0,ay=sc*(-140+4);
  // J-Hook pivot point (end of tether, swings)
  let jx=Math.sin(swing)*tetherLen;
  let jy=ay+Math.cos(swing)*tetherLen;

  // Draw tether
  $.strokeStyle='rgba(15,170,182,0.4)';$.lineWidth=1.5;$.setLineDash([4,3]);
  $.beginPath();$.moveTo(ax,ay);
  // Slight curve in tether
  $.quadraticCurveTo(ax+jx*0.3,ay+(jy-ay)*0.5,jx,jy);
  $.stroke();$.setLineDash([]);

  // Draw J-Hook at end of tether (the cargo hook with ball inside)
  $.save();$.translate(jx,jy);$.rotate(swing*0.5);
  // J-Hook shape: vertical stem + curve, no top-left serif
  let jhg=$.createLinearGradient(0,-12,-10,40);jhg.addColorStop(0,'#0FAAB6');jhg.addColorStop(1,'#DE9C36');
  $.fillStyle=jhg;
  $.beginPath();
  // Right side: stem down, curves left into hook
  $.moveTo(-4,-12);$.lineTo(4,-12);  // top of stem (no serif)
  $.lineTo(4,14);                     // stem down
  $.quadraticCurveTo(4,32,-6,38);     // curve bottom
  $.quadraticCurveTo(-14,42,-22,38);  // hook end left
  $.quadraticCurveTo(-28,34,-28,26);  // inner curve up
  $.lineTo(-18,26);                   // inner wall
  $.quadraticCurveTo(-18,32,-12,34);  // inner hook
  $.quadraticCurveTo(-6,36,-2,30);    // inner curve
  $.quadraticCurveTo(0,26,0,20);      // back up
  $.lineTo(-4,20);$.lineTo(-4,-12);   // inner stem
  $.closePath();$.fill();
  // Ball/Pod nestled inside the J curve — rolls with inertia
  // Ball rolls opposite to swing direction along the curve
  let ballT=-swing*3.5; // inertia: opposite to swing, amplified
  // Parametric position along the inner curve of the J-hook
  // Center rest: (-12, 30), rolls left toward (-20, 28) or right toward (-4, 26)
  let bx=-12+ballT*8;
  let by=30-Math.abs(ballT)*4; // rises slightly when displaced
  // Clamp to stay inside the curve
  bx=Math.max(-20,Math.min(-4,bx));
  $.fillStyle='#DE9C36';$.globalAlpha=0.7;
  $.beginPath();$.arc(bx,by,4.5,0,Math.PI*2);$.fill();
  $.globalAlpha=1;
  $.fillStyle='#FDBF55';$.globalAlpha=0.5;
  $.beginPath();$.arc(bx,by,2.5,0,Math.PI*2);$.fill();
  $.globalAlpha=1;
  $.restore();
  $.restore();

  // --- Arc around logo ---
  $.save();$.translate(W/2,95);
  $.strokeStyle='rgba(15,170,182,0.1)';$.lineWidth=1.5;$.lineCap='round';
  $.beginPath();$.arc(0,5,80,Math.PI*0.6,Math.PI*0.4);$.stroke();
  $.restore();

  // === BIG TITLE — the hero ===
  // Glow layers for depth
  $.shadowColor='#c8e030';$.shadowBlur=30;
  $.fillStyle='rgba(200,224,48,0.15)';$.font='bold 72px monospace';
  $.fillText('J-THRUST',W/2,260);
  $.shadowBlur=15;
  $.fillStyle='#c8e030';$.font='bold 72px monospace';
  $.fillText('J-THRUST',W/2,260);
  $.shadowBlur=0;

  // Accent line under title
  let lg=$.createLinearGradient(W/2-180,0,W/2+180,0);
  lg.addColorStop(0,'rgba(15,170,182,0)');lg.addColorStop(0.3,'rgba(15,170,182,0.3)');
  lg.addColorStop(0.7,'rgba(222,156,54,0.3)');lg.addColorStop(1,'rgba(222,156,54,0)');
  $.strokeStyle=lg;$.lineWidth=1.5;
  $.beginPath();$.moveTo(W/2-180,278);$.lineTo(W/2+180,278);$.stroke();

  // Subtitle
  $.fillStyle='#8aa020';$.font='16px monospace';$.fillText('LEVI EDITION',W/2,310);

  // 6-item menu
  let pulse=0.6+0.4*Math.sin(Date.now()*0.004);
  const items=['LEVI','KLASSIK','ARENA','DUELL','COOP','EINSTELLUNGEN'];
  const descs=['Übungs-Level für Feinmotorik','10 klassische Thrust-Level','Überlebenskampf gegen Wellen','1v1 Duell — Bot oder Online','Zwei Spieler — ein Schiff!','Physik, Sound & Presets'];
  const itemColors=['#c8e030','#c8e030','#c8e030','#f44','#0FAAB6','#8aa020'];
  const itemColorsOff=['#556818','#556818','#556818','#622','#064','#445'];
  let menuY=350,menuGap=38;
  for(let i=0;i<6;i++){
    let sel=i===menuSel;
    $.fillStyle=sel?`rgba(${i===3?'255,68,68':i===4?'15,170,182':'200,224,48'},${pulse})`:itemColorsOff[i];
    $.font=(sel?'bold ':'')+'20px monospace';
    $.fillText((sel?'▸  ':'   ')+items[i]+(sel?'  ◂':''),W/2,menuY+i*menuGap);
    if(sel){$.fillStyle=i===3?'#f88':i===4?'#0FAAB6':'#8aa020';$.font='11px monospace';$.fillText(descs[i],W/2,menuY+i*menuGap+17);}
  }
  $.fillStyle='#8aa020';$.font='13px monospace';
  $.fillText(INPUT.lastDevice==='gamepad'?'D-Pad Auswahl  |  A Starten':'↑ ↓  Auswahl  |  ENTER / SPACE  Starten',W/2,H-30);
  $.textAlign='left';
}

  else $.fillText('↑↓ Wählen | ENTER Starten | ESC Zurück',W/2,H-14);
  $.textAlign='left';
}

function drawLeviIcon(cx,cy,type,sz){
  // Draw visual icons for each action so Levi understands without reading
  $.save();$.translate(cx,cy);
  let s=sz||1;$.scale(s,s);
  if(type==='left'){
    // Curved arrow pointing left (rotation)
    $.strokeStyle='#0FAAB6';$.lineWidth=2.5;$.lineCap='round';
    $.beginPath();$.arc(0,0,14,Math.PI*1.8,Math.PI*1.1,true);$.stroke();
    $.fillStyle='#0FAAB6';$.beginPath();$.moveTo(-14,-6);$.lineTo(-8,-14);$.lineTo(-6,-4);$.closePath();$.fill();
    // Mini ship in center
    $.fillStyle='#c8e030';$.beginPath();$.moveTo(-3,0);$.lineTo(0,-6);$.lineTo(3,0);$.closePath();$.fill();
  }else if(type==='right'){
    // Curved arrow pointing right (rotation)
    $.strokeStyle='#0FAAB6';$.lineWidth=2.5;$.lineCap='round';
    $.beginPath();$.arc(0,0,14,Math.PI*1.2,Math.PI*1.9);$.stroke();
    $.fillStyle='#0FAAB6';$.beginPath();$.moveTo(14,-6);$.lineTo(8,-14);$.lineTo(6,-4);$.closePath();$.fill();
    // Mini ship
    $.fillStyle='#c8e030';$.beginPath();$.moveTo(-3,0);$.lineTo(0,-6);$.lineTo(3,0);$.closePath();$.fill();
  }else if(type==='thrust'){
    // Ship with flame underneath
    $.fillStyle='#0FAAB6';$.beginPath();$.moveTo(0,-14);$.lineTo(-7,0);$.lineTo(7,0);$.closePath();$.fill();
    $.fillStyle='#DE9C36';$.beginPath();$.moveTo(-4,1);$.lineTo(0,14);$.lineTo(4,1);$.closePath();$.fill();
    $.fillStyle='#FDBF55';$.globalAlpha=0.7;$.beginPath();$.moveTo(-2,1);$.lineTo(0,9);$.lineTo(2,1);$.closePath();$.fill();$.globalAlpha=1;
  }else if(type==='shoot'){
    // Ship with projectile shooting forward
    $.fillStyle='#0FAAB6';$.beginPath();$.moveTo(0,2);$.lineTo(-6,14);$.lineTo(6,14);$.closePath();$.fill();
    // Bullet
    $.fillStyle='#ff0';$.fillRect(-1.5,-4,3,6);
    // Muzzle flash
    $.fillStyle='rgba(255,255,0,0.4)';$.beginPath();$.arc(0,-2,4,0,Math.PI*2);$.fill();
    // Star burst
    $.strokeStyle='#ff0';$.lineWidth=1.5;
    $.beginPath();$.moveTo(0,-12);$.lineTo(0,-8);$.stroke();
    $.beginPath();$.moveTo(-3,-11);$.lineTo(-1.5,-8);$.stroke();
    $.beginPath();$.moveTo(3,-11);$.lineTo(1.5,-8);$.stroke();
  }
  $.restore();
}
function renderLeviKeyConfig(){
  $.textAlign='center';$.fillStyle='#c8e030';$.shadowColor='#c8e030';$.shadowBlur=8;
  $.font='bold 22px monospace';$.fillText('LEVI — TASTEN EINSTELLEN',W/2,60);$.shadowBlur=0;
  const iconTypes=['left','right','thrust','shoot'];
  if(leviKeyCfgStep===-1){
    $.fillStyle='#8aa020';$.font='14px monospace';$.fillText('Aktuelle Belegung:',W/2,120);
    for(let i=0;i<4;i++){
      let y=175+i*55;
      // Icon left of text
      drawLeviIcon(W/2-130,y-4,iconTypes[i],1.4);
      $.fillStyle='#c8e030';$.font='bold 16px monospace';$.textAlign='center';
      $.fillText(LEVI_KEY_LABELS[i]+':   '+keyName(leviKeys[LEVI_KEY_ACTIONS[i]]),W/2+20,y);
    }
    $.fillStyle='#c8e030';$.font='bold 15px monospace';
    if(INPUT.lastDevice==='gamepad'){
      $.fillText('Start = So spielen',W/2,420);
      $.fillStyle='#8aa020';$.font='13px monospace';
      $.fillText('A = Neu belegen',W/2,450);
      $.fillStyle='#556818';$.font='10px monospace';
      $.fillText('B = Zurück',W/2,H-14);
    }else{
      $.fillText('ENTER = So spielen',W/2,420);
      $.fillStyle='#8aa020';$.font='13px monospace';
      $.fillText('LEERTASTE = Neu belegen',W/2,450);
      $.fillStyle='#556818';$.font='10px monospace';
      $.fillText('ESC = Zurück',W/2,H-14);
    }
  }else{
    for(let i=0;i<4;i++){
      let y=155+i*60;
      drawLeviIcon(W/2-140,y-4,iconTypes[i],1.5);
      if(i<leviKeyCfgStep){
        $.fillStyle='#c8e030';$.font='bold 16px monospace';$.textAlign='center';
        $.fillText('✓ '+LEVI_KEY_LABELS[i]+':   '+keyName(leviKeys[LEVI_KEY_ACTIONS[i]]),W/2+20,y);
      }else if(i===leviKeyCfgStep){
        let blink=Math.sin(Date.now()*0.006)>0;
        $.fillStyle=blink?'#ff0':'#cc0';$.font='bold 18px monospace';$.textAlign='center';
        $.fillText('▸ Drücke eine Taste für '+LEVI_KEY_LABELS[i]+'...',W/2+20,y);
      }else{
        $.fillStyle='#556818';$.font='16px monospace';$.textAlign='center';
        $.fillText('  '+LEVI_KEY_LABELS[i]+':   ?',W/2+20,y);
      }
    }
    $.fillStyle='#556818';$.font='10px monospace';
    $.fillText('ESC = Abbrechen',W/2,H-14);
  }
  $.textAlign='left';
}

function renderLeviLevelSelect(){
  $.textAlign='center';$.fillStyle='#c8e030';$.shadowColor='#c8e030';$.shadowBlur=8;
  $.font='bold 24px monospace';$.fillText('LEVI — LEVEL AUSWÄHLEN',W/2,60);$.shadowBlur=0;
  for(let i=0;i<6;i++){
    let sel=i===leviLevel,y=120+i*70;
    $.fillStyle=sel?'#c8e030':'#556818';$.font=(sel?'bold ':'')+'16px monospace';
    $.fillText((sel?'▸ ':'  ')+(i+1)+'. '+LEVI_LEVELS[i].n,W/2,y);
    if(sel){
      $.fillStyle='#8aa020';$.font='11px monospace';
      $.fillText(LEVI_LEVELS[i].desc,W/2,y+18);
      let tagMap={fly:'Fliegen',pod:'Pod + Seil',rings:'Ringe',path:'Pfad',numbers:'Zahlen 1-9',word:'Wort hören + buchstabieren'};
      let tag=tagMap[LEVI_LEVELS[i].type]||'';
      if(tag)$.fillText('[ '+tag+' ]',W/2,y+34);
    }
  }
  $.fillStyle='#8aa020';$.font='10px monospace';
  if(INPUT.lastDevice==='gamepad')$.fillText('D-Pad Wählen | A Starten | B Zurück',W/2,H-14);
  else $.fillText('↑↓ Wählen | ENTER Starten | ESC Zurück',W/2,H-14);
  $.textAlign='left';
}

function renderGamepadReady(){
  if(!stars)makeStars(H);
  for(let s of stars){$.fillStyle=`rgba(180,180,220,${s.b})`;$.fillRect(s.x,(s.y+Date.now()*0.008*s.b)%H,s.s,s.s);}
  $.textAlign='center';
  $.fillStyle='#c8e030';$.shadowColor='#c8e030';$.shadowBlur=10;
  $.font='bold 24px monospace';$.fillText('GAMEPAD STEUERUNG',W/2,50);$.shadowBlur=0;

  let cx=W/2,cy=260;
  $.strokeStyle='#444';$.lineWidth=2;$.fillStyle='#1a1a1a';
  _roundRect($,cx-180,cy-60,360,140,20,true,true);
  _roundRect($,cx-170,cy+50,80,60,15,true,true);
  _roundRect($,cx+90,cy+50,80,60,15,true,true);

  // Left Stick
  $.fillStyle='#333';$.beginPath();$.arc(cx-100,cy+10,28,0,Math.PI*2);$.fill();
  $.strokeStyle='#c8e030';$.lineWidth=2;$.stroke();
  $.fillStyle='#555';$.beginPath();$.arc(cx-100,cy+10,18,0,Math.PI*2);$.fill();
  $.strokeStyle='#c8e030';$.lineWidth=2;
  $.beginPath();$.moveTo(cx-130,cy+10);$.lineTo(cx-70,cy+10);$.stroke();
  $.beginPath();$.moveTo(cx-128,cy+6);$.lineTo(cx-134,cy+10);$.lineTo(cx-128,cy+14);$.stroke();
  $.beginPath();$.moveTo(cx-72,cy+6);$.lineTo(cx-66,cy+10);$.lineTo(cx-72,cy+14);$.stroke();

  // D-Pad
  $.fillStyle='#333';
  $.fillRect(cx-160,cy-20,12,36);$.fillRect(cx-172,cy-8,36,12);

  // Face buttons
  let fbx=cx+100,fby=cy;
  $.fillStyle='#333';$.beginPath();$.arc(fbx,fby-28,11,0,Math.PI*2);$.fill();
  $.fillStyle='#555';$.font='bold 10px monospace';$.fillText('Y',fbx,fby-25);
  $.fillStyle='#333';$.beginPath();$.arc(fbx-28,fby,11,0,Math.PI*2);$.fill();
  $.fillStyle='#555';$.fillText('X',fbx-28,fby+3);
  // B — FIRE
  $.fillStyle='#f44';$.beginPath();$.arc(fbx+28,fby,11,0,Math.PI*2);$.fill();
  $.fillStyle='#fff';$.fillText('B',fbx+28,fby+3);
  // A
  $.fillStyle='#333';$.beginPath();$.arc(fbx,fby+28,11,0,Math.PI*2);$.fill();
  $.fillStyle='#555';$.fillText('A',fbx,fby+31);

  // Bumpers
  $.fillStyle='#333';
  _roundRect($,cx-160,cy-80,70,16,6,true,false);
  _roundRect($,cx+90,cy-80,70,16,6,true,false);
  $.fillStyle='#555';$.font='bold 9px monospace';$.fillText('LB',cx-125,cy-69);
  $.fillStyle='#555';$.fillText('RB',cx+125,cy-69);

  // Triggers
  $.fillStyle='#48f';_roundRect($,cx-150,cy-100,50,18,6,true,false);
  $.fillStyle='#fff';$.font='bold 9px monospace';$.fillText('LT',cx-125,cy-88);
  $.fillStyle='#ff0';_roundRect($,cx+100,cy-100,50,18,6,true,false);
  $.fillStyle='#000';$.fillText('RT',cx+125,cy-88);

  // Labels
  $.font='bold 13px monospace';$.textAlign='left';
  $.fillStyle='#c8e030';$.fillText('DREHEN',cx-220,cy-30);
  $.strokeStyle='#c8e030';$.lineWidth=1;$.beginPath();$.moveTo(cx-220,cy-25);$.lineTo(cx-130,cy+5);$.stroke();
  $.textAlign='right';
  $.fillStyle='#ff0';$.fillText('SCHUB',cx+230,cy-120);
  $.strokeStyle='#ff0';$.lineWidth=1;$.beginPath();$.moveTo(cx+210,cy-115);$.lineTo(cx+140,cy-95);$.stroke();
  $.textAlign='left';
  $.fillStyle='#48f';$.fillText('BREMSE',cx-240,cy-120);
  $.strokeStyle='#48f';$.lineWidth=1;$.beginPath();$.moveTo(cx-195,cy-115);$.lineTo(cx-140,cy-95);$.stroke();
  $.textAlign='right';
  $.fillStyle='#f44';$.fillText('FEUER',cx+230,cy-10);
  $.strokeStyle='#f44';$.lineWidth=1;$.beginPath();$.moveTo(cx+210,cy-15);$.lineTo(cx+140,cy);$.stroke();

  $.textAlign='center';
  let pulse=0.5+0.5*Math.sin(Date.now()*0.004);
  $.fillStyle=`rgba(200,224,48,${0.4+pulse*0.6})`;$.font='bold 16px monospace';
  $.fillText('BELIEBIGE TASTE DRÜCKEN',W/2,H-50);
  $.fillStyle='#556818';$.font='12px monospace';
  $.fillText('Stick = Drehen  |  RT = Gas  |  LT = Bremse  |  B = Feuer',W/2,H-25);
  $.textAlign='left';
}
function _roundRect(ctx,x,y,w,h,r,fill,stroke){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
  if(fill)ctx.fill();if(stroke)ctx.stroke();
}

function renderComplete(){
  if(stars)for(let s of stars){$.fillStyle=`rgba(180,180,220,${s.b})`;$.fillRect(s.x,(s.y+Date.now()*0.006*s.b)%H,s.s,s.s);}
  $.textAlign='center';$.fillStyle='#ff0';$.shadowColor='#ff0';$.shadowBlur=12;$.font='bold 36px monospace';
  $.fillText('ALLE LEVELS',W/2,H/2-60);$.fillText('ABGESCHLOSSEN!',W/2,H/2-20);$.shadowBlur=0;
  $.fillStyle='#c8e030';$.font='18px monospace';$.fillText('Endstand: '+score,W/2,H/2+30);
  $.fillStyle='#8aa020';$.font='14px monospace';$.fillText('Du bist ein wahrer Pilot!',W/2,H/2+65);
  if(Math.floor(Date.now()/500)%2){$.fillStyle='#ff0';$.font='14px monospace';$.fillText(INPUT.lastDevice==='gamepad'?'A für Menü':'LEERTASTE für Menü',W/2,H/2+110);}
  $.textAlign='left';
}

// === LOOP ===
makeStars(H);
(function loop(){update();render();requestAnimationFrame(loop);})();
</script>
