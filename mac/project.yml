name: JThrust
options:
  bundleIdPrefix: de.jochenhornung
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.3"
targets:
  JThrust:
    type: application
    platform: macOS
    sources:
      - path: JThrust
        excludes:
          - Info.plist
    postCompileScripts:
      - script: |
          set -e
          WEB_DST="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/Web"
          rm -rf "${WEB_DST}"
          mkdir -p "${WEB_DST}"
          cp -RL "${PROJECT_DIR}/Web/j-thrust.html" "${WEB_DST}/"
        name: "Copy Web Assets"
    info:
      path: JThrust/Info.plist
      properties:
        CFBundleDisplayName: J-THRUST
        LSMinimumSystemVersion: "14.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.jochenhornung.jthrust
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: VA8S75SSYF
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
